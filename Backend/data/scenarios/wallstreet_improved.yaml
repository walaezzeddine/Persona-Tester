name: "Stock Analysis & Trading Decision"
description: |
  You are on Wall Street Survivor, a stock market simulator. Your task is to:
  1. Search for and analyze Apple (AAPL) stock
  2. Review its current price, performance, and key metrics
  3. Make a BUY or SELL trading decision based on your analysis

  IMPORTANT GUIDANCE:
  - If you see a search box or stock ticker input, TYPE "AAPL" and press Enter/Search
  - Look for stock price, market cap, price-to-earnings ratio, or performance charts
  - After analyzing, make a clear BUY or SELL decision (not just "analyze" - decide!)
  - If you can't find search: try clicking links like "Stock Game", "Search", "Research Tools"
  - If stuck in loops: try using BROWSER_EVALUATE to find hidden search elements
  - Maximum 3 attempts to find stock - then try alternative approach

constraints:
  time_limit: 300  # seconds
  max_retries: 3

success_criteria:
  - "Found Apple (AAPL) stock information with current price"
  - "Reviewed at least 2 metrics (price, performance, P/E ratio, etc.)"
  - "Made an explicit BUY or SELL decision with reasoning"

abandon_criteria:
  - "Cannot find stock search functionality after 3 attempts"
  - "Cannot locate any stock price or analysis data"
  - "Website navigation is entirely broken (all links lead to same page)"

key_actions:
  - "Search for AAPL using search box or stock ticker input"
  - "Navigate to Apple stock details page"
  - "Review price, performance trends, and fundamental metrics"
  - "Decide: Will you BUY or SELL this stock?"
  - "State your decision and 2-3 reasons why"
