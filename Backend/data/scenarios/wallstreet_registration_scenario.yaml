name: "Wall Street Survivor - User Registration Scenario"
target_url: "https://www.wallstreetsurvivor.com/"

description: |
  Complete a new user registration on Wall Street Survivor:
  1. Navigate to the registration page
  2. Fill in registration form with new user details
  3. Enter email address
  4. Create password
  5. Accept terms and conditions
  6. Submit registration form
  7. Verify registration success
  8. Check confirmation email or account activation
  9. Optional: Login with new account to verify it works

constraints:
  time_limit: 600
  max_retries: 2

success_criteria:
  - "Successfully navigated to registration page"
  - "Registration form loaded and visible"
  - "All required fields identified"
  - "Form filled with valid data"
  - "Registration form submitted successfully"
  - "Success/confirmation message displayed"
  - "New account created"
  - "User can login with new credentials"

abandon_criteria:
  - "Cannot find registration page"
  - "Registration form not accessible"
  - "Required form fields missing"
  - "Form submission fails"
  - "Error message returned"
  - "Account creation failed"

key_actions:
  - "Step 1: Navigate to Wall Street Survivor homepage"
  - "Step 2: Take snapshot to see navigation options"
  - "Step 3: Look for 'Sign Up', 'Register', or 'Create Account' button"
  - "Step 4: Click registration/sign up button"
  - "Step 5: Wait for registration page to load"
  - "Step 6: Take snapshot of registration form"
  - "Step 7: Identify all required fields (First Name, Last Name, Email, Password, etc.)"
  - "Step 8: Fill in First Name field"
  - "Step 9: Fill in Last Name field"
  - "Step 10: Fill in Email field with unique email"
  - "Step 11: Fill in Password field"
  - "Step 12: Fill in Password confirmation field"
  - "Step 13: If present, read Terms & Conditions"
  - "Step 14: Accept Terms & Conditions (check checkbox if present)"
  - "Step 15: Accept Privacy Policy if separate checkbox"
  - "Step 16: Review the form for completeness"
  - "Step 17: Take snapshot of filled form"
  - "Step 18: Click 'Sign Up', 'Register', or 'Create Account' button"
  - "Step 19: Wait for form submission and response"
  - "Step 20: Take snapshot of result page"
  - "Step 21: Look for success message or confirmation"
  - "Step 22: Verify no error messages"
  - "Step 23: Note any confirmation steps (email verification, etc.)"
  - "Step 24: Take final snapshot showing successful registration"
  - "Step 25: DONE - Successfully registered new account"

site_guidance: |
  WALL STREET SURVIVOR REGISTRATION SCENARIO:
  
  🏠 FINDING REGISTRATION PAGE
  - Navigate to: https://www.wallstreetsurvivor.com/
  - Look for navigation bar with:
    * "Sign Up" button/link
    * "Register" link
    * "Create Account" button
    * "Join Now" button
  - Some sites have signup in:
    * Top right corner
    * Main call-to-action button
    * Footer area
    * Separate /register or /signup URL
  - Try common URLs if not found:
    * https://www.wallstreetsurvivor.com/register
    * https://www.wallstreetsurvivor.com/signup
    * https://www.wallstreetsurvivor.com/join
  
  📝 REGISTRATION FORM FIELDS
  - Typical fields on financial sites:
    * First Name
    * Last Name
    * Email Address (primary identifier)
    * Password (usually 8+ chars, needs uppercase, number, special char)
    * Confirm Password
    * Date of Birth (if required)
    * Terms & Conditions (checkbox)
    * Newsletter signup (optional)
  - Fill each field with appropriate data:
    * First Name: "TestUser" or similar
    * Last Name: "Automation" or similar
    * Email: Must be UNIQUE each time! 
      - Use format: testuser_<timestamp>@example.com
      - Or: testuser_<random_number>@gmail.com
      - Example: testuser_2025_04_14_10_30@gmail.com
    * Password: Must meet requirements
      - At least 8 characters
      - Include: UPPERCASE, lowercase, number, special character
      - Example: "SecurePass123!" or "Test@2025"
  
  ✅ TERMS & CONDITIONS
  - Usually a checkbox that says "I agree to Terms and Conditions"
  - May link to full terms (don't navigate away)
  - Sometimes separate "I agree to Privacy Policy" checkbox
  - Both must be checked for successful registration
  - If present, check them!
  
  🔐 PASSWORD REQUIREMENTS
  - Common requirements on financial platforms:
    * Minimum 8-12 characters
    * At least one uppercase letter
    * At least one lowercase letter
    * At least one number
    * At least one special character (!@#$%^&*)
  - Use password: "WallStreet@2025" or similar
  - Confirm password must match exactly
  
  📧 EMAIL STRATEGY
  - CRITICAL: Use NEW unique email each test run!
  - Cannot register same email twice
  - Options:
    1. Use gmail.com with + trick:
       - testuser+wallstreet1@gmail.com
       - testuser+wallstreet2@gmail.com
       - Same gmail inbox, different account
    2. Use temporary email service
    3. Generate timestamp-based:
       - user20250414103000@test.com
    4. Use random format:
       - randomuser12345@example.com
  
  🎯 REGISTRATION SUBMISSION
  - Review all fields before clicking submit
  - Click "Sign Up", "Register", "Create Account", or "Join Now"
  - Page will submit form
  - Wait for response (may take 2-5 seconds)
  
  ✨ SUCCESS INDICATORS
  - Page redirects to:
    * Confirmation page
    * Dashboard
    * Email verification page
    * Account setup/profile page
  - Shows message: "Registration successful", "Welcome!", "Check your email"
  - No error messages displayed
  - Account appears in user profile
  
  ⚠️ COMMON ISSUES & SOLUTIONS
  - Issue: "Email already registered"
    → Solution: Use NEW unique email
  
  - Issue: "Password doesn't meet requirements"
    → Solution: Add uppercase, number, special char
  
  - Issue: "Terms must be accepted"
    → Solution: Find and check Terms checkbox
  
  - Issue: "Form field is required"
    → Solution: Ensure all visible fields are filled
  
  - Issue: "Invalid email format"
    → Solution: Use proper email format (user@domain.com)
  
  🔄 VERIFY REGISTRATION (Optional)
  - After successful registration:
    * Check if automatic login happened
    * Or navigate to login page
    * Use new email + password to login
    * Confirm account works
    * Access dashboard or home page
  
  💡 TEST DATA TEMPLATE
  - First Name: "AutoTest"
  - Last Name: "User"
  - Email: "autotest_<timestamp>@wallstreettest.com" (change each run!)
  - Password: "WallStreet@2025"
  - Password Confirm: "WallStreet@2025"
  - Agree to Terms: YES
  - Agree to Privacy: YES (if separate)
