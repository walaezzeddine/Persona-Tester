name: "screenshot_comprehension_test"
objectif: "Use the screenshot to pick a product by visual position: choose the top-left visible product card and add it to cart. In your thought, explicitly mention the visual cue 'top-left'."
description: "Behavioral vision test to verify screenshot-guided reasoning instead of text-only extraction."
strict_done_validation: true
success_criteria:
  - "Agent reaches cart verification conditions"
  - "Thought process includes visual cue: top-left"
abandon_criteria:
  - "Unable to act after repeated MCP/tool errors"
  - "Max steps reached without cart evidence"
notes: "This test is intended for vision-capable models and Browser Use sandbox enabled runs."
