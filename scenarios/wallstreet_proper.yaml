name: "Register Account & Access Beginner Course"
target_url: "https://www.wallstreetsurvivor.com/"

description: |
  Register for a new account on Wall Street Survivor, then access a beginner investing course.
  Complete account registration with email and password, then navigate to courses section.

constraints:
  time_limit: 600
  max_retries: 3

success_criteria:
  - "Successfully completed account registration"
  - "Logged in with new account"
  - "Successfully found and accessed a beginner investing course"

abandon_criteria:
  - "Cannot find registration/login link after 6+ attempts"
  - "Registration form fails or won't submit"
  - "Website structure fundamentally blocks navigation"

key_actions:
  - "Step 1: Navigate to homepage and take snapshot"
  - "Step 2: Find and click 'Register' or 'Login' link in navigation"
  - "Step 3: Click on registration option if available"
  - "Step 4: Fill in registration form (email and password)"
  - "Step 5: Submit registration form and confirm account creation"
  - "Step 6: Navigate to Courses section"
  - "Step 7: Find and click a beginner course"
  - "Step 8: Verify course content is displayed"

site_guidance: |
  CRITICAL: Wall Street Survivor is a Single Page Application (SPA)

  Registration/Login Process:
  - Look for "Login" or "Register" link in the top navigation
  - Registration typically requires: email, password, and optional name
  - After registration, user should be logged in automatically
  - Take snapshot after each major action to confirm state

  Expected Navigation Pattern:
  - Clicking links adds # to URL (wallstreetsurvivor.com/#)
  - This is NORMAL - content loads dynamically
  - ALWAYS take browser_snapshot after EVERY click to see new content
  - Read the snapshot carefully - it contains ALL visible links and refs

  Step-by-Step Protocol:
  1. browser_navigate to https://www.wallstreetsurvivor.com/
  2. browser_snapshot to see current page
  3. Look for "Login" or "Register" link (ref=eXX)
  4. browser_click on that link
  5. browser_snapshot to see registration/login form
  6. Use browser_fill_form to fill in email and password
  7. Use browser_click to submit the registration form
  8. After registration succeeds, navigate to Courses

  Form Fields to Fill:
  - Email address: use format like "test_USER@example.com" where USER is unique
  - Password: use a strong password like "TestPassword123!"
  - Optional: Name or other fields if present

  What You're Looking For:
  - Registration/Join/Sign Up button or link
  - Form with email and password fields
  - Register/Submit button
  - Success confirmation or redirect to dashboard
  - Then access Courses to find beginner course

  Common Navigation Gotchas:
  - Login and Register might be separate options - choose Register for new account
  - After successful registration, user may need to click Courses again
  - Some fields might be optional - focus on email and password
  - Look for any validation messages if form submission fails

  Navigation Chain (expected):
  HOME -> Login/Register -> Fill Form -> Submit -> Success -> Courses -> Beginner Course
