name: "Wall Street Survivor - Registration + Login Scenario"
target_url: "https://app.wallstreetsurvivor.com/members/register"

description: |
  Complete full user onboarding flow:
  1. Navigate to the registration page
  2. Fill in registration form with new user details
  3. Submit registration form
  4. Verify registration success
  5. Automatically login with the new account
  6. Access dashboard and verify entry into the website
  7. Take screenshot of logged-in dashboard

constraints:
  time_limit: 600
  max_retries: 2

success_criteria:
  - "Successfully registered new account"
  - "Registration confirmation/success page displayed"
  - "Successfully logged in with new credentials"
  - "Dashboard/home page is visible"
  - "User profile/username visible after login"
  - "Can see portfolio/trading interface"

abandon_criteria:
  - "Registration form not accessible"
  - "Form submission fails"
  - "Account creation failed"
  - "Login fails after registration"
  - "Cannot access dashboard"

key_actions:
  - "Step 1: Navigate to Wall Street Survivor registration page"
  - "Step 2: Take snapshot to see registration form"
  - "Step 3: Identify all registration form fields"
  - "Step 4: Fill in email field with unique email"
  - "Step 5: Fill in password field"
  - "Step 6: Fill in password confirmation field"
  - "Step 7: Fill in username field"
  - "Step 8: Select portfolio option"
  - "Step 9: Accept terms and conditions (check checkbox)"
  - "Step 10: Review complete form"
  - "Step 11: Click Register/Sign Up button"
  - "Step 12: Wait for registration to complete"
  - "Step 13: Take snapshot of success page"
  - "Step 14: Verify success message or confirmation"
  - "Step 15: Extract newly created credentials"
  - "Step 16: Navigate to login page (or already redirected)"
  - "Step 17: Take snapshot of login form"
  - "Step 18: Fill in username/email field with newly registered email"
  - "Step 19: Fill in password field with newly registered password"
  - "Step 20: Click Log In button"
  - "Step 21: Wait for dashboard to load"
  - "Step 22: Take snapshot of dashboard"
  - "Step 23: Verify user is logged in (see username or profile)"
  - "Step 24: Verify can see trading interface/portfolio"
  - "Step 25: Take final screenshot of logged-in dashboard"
  - "Step 26: DONE - Successfully registered and logged in"

site_guidance: |
  WALL STREET SURVIVOR - REGISTRATION + LOGIN FLOW:
  
  🔐 REGISTRATION PAGE
  - URL: https://app.wallstreetsurvivor.com/members/register
  - Form Fields:
    * Email Address (unique identifier)
    * Password (8+ chars, uppercase, lowercase, number, special char)
    * Confirm Password (must match)
    * Username (for login, can be different from email)
    * Choose Portfolio (e.g., "My Practice Portfolio")
    * Terms & Conditions (checkbox)
  
  📝 FILLING REGISTRATION FORM
  - Email: [unique email provided in credentials]
  - Password: [provided password, e.g., WallStreet@2025]
  - Confirm Password: [same as password]
  - Username: [provided username]
  - Portfolio: Select "My Practice Portfolio" or default option
  - Terms: Check the "I agree to Terms" checkbox
  - Click "Register" or "Create Account"
  
  ✅ AFTER REGISTRATION
  - Page will show success message
  - May auto-redirect to login page
  - Or show confirmation page with next steps
  - Account is now active and ready
  
  🔑 LOGIN WITH NEW ACCOUNT
  - Navigate to: https://app.wallstreetsurvivor.com/login (if not auto-redirected)
  - Email/Username: Use the newly registered email or username
  - Password: Use the newly registered password
  - Click "Log me in" or "Login"
  
  💼 DASHBOARD/HOME PAGE
  - After login, redirects to dashboard
  - Should see:
    * Username displayed (top right or profile)
    * Trading interface / Portfolio
    * Account balance ($100,000 practice money)
    * Navigation menus
    * Recent activity
  - This confirms successful login and account access
  
  ⚠️ IMPORTANT NOTES:
  - Registration email must be unique (no duplicates)
  - Password must meet complexity requirements
  - Username must follow platform rules (may have restrictions)
  - After registration, account is immediately usable
  - No email verification may be required (check if needed)
  - Login should work immediately after registration
  
  💡 FLOW SUMMARY:
  1. Go to registration page
  2. Fill and submit form
  3. See success page
  4. Go to login page
  5. Enter same credentials
  6. See dashboard
  7. Success!
