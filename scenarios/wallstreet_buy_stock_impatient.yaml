name: "Wall Street Survivor - Buy Stock (Impatient User)"
description: "Fast stock purchase scenario - Impatient user reacts quickly to trends"

objectif: "Search a stock and buy shares in under 20 seconds - no hesitation"

context:
  username: WALAEZZEDINE
  password: WALA@123
  portfolio: "My Practice Portfolio"
  target_stock: "AAPL"
  buy_quantity: 1

key_actions:
  - Login to Wall Street Survivor with credentials
  - Search for AAPL stock immediately (no browsing, no research)
  - Click buy button without hesitation
  - Enter quantity (1 share)
  - Confirm purchase quickly
  - Record completion time

success_criteria:
  - Successfully logged in
  - Stock purchase initiated within 20 seconds
  - Transaction confirmed
  - Time limit respected (< 20 seconds)

# Detailed scenario steps for LLM guidance
steps:
  - step_1:
      description: "Login to dashboard"
      action: "Navigate to login, enter credentials (auto-filled), click login"
      expected: "Dashboard accessible with portfolio"
      time_budget: "5 seconds"
      
  - step_2:
      description: "Search for stock - NO RESEARCH"
      action: "Find search box, type AAPL, press enter"
      expected: "AAPL stock page appears"
      time_budget: "3 seconds"
      guidance: "Act FAST - do not wait to read details, just search"
      
  - step_3:
      description: "Click buy immediately"
      action: "Find and click BUY button on AAPL stock page"
      expected: "Buy dialog/form appears"
      time_budget: "2 seconds"
      guidance: "No hesitation - click BUY right away"
      
  - step_4:
      description: "Enter quantity and confirm"
      action: "Set quantity to 1, click CONFIRM/SUBMIT"
      expected: "Order confirmation appears"
      time_budget: "5 seconds"
      guidance: "Speed is critical - use default quantity if available"
      
  - step_5:
      description: "Done - transaction complete"
      action: "Verify order confirmation"
      expected: "See transaction confirmation or updated portfolio"
      time_budget: "5 seconds"

# Persona behavior rules
persona_rules:
  - You are IMPATIENT - speed is everything
  - Do NOT read stock details or analysis
  - Do NOT compare prices or chart performance
  - Do NOT think about whether to buy - just BUY
  - Act on impulse - FAST reactions are your strength
  - React to trends immediately without analysis
  - Skip all research and due diligence

strict_done_validation: true
max_steps: 30
