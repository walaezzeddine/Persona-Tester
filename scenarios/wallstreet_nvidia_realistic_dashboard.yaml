site_guidance: |
  WALL STREET SURVIVOR - REALISTIC TRADING FLOW (HUMAN BEHAVIOR ONLY)

  🚫 CRITICAL RESTRICTION - MUST FOLLOW:
  ❌ YOU ARE FORBIDDEN FROM USING browser_navigate WITH HARDCODED URLs
  ❌ NO direct URL shortcuts like: https://app.wallstreetsurvivor.com/...
  ⚠️ YOU CAN ONLY browser_navigate TO THE INITIAL HOMEPAGE on first step
  ✅ ALL other navigation MUST use visible UI elements (buttons, links, search boxes)

  How to navigate correctly:
  - Take snapshot → Find visible text link/button
  - Use browser_evaluate to locate clickable elements by their visible text
  - Click discovered elements using their ref or browser_evaluate
  - Use search boxes (type then press Enter)
  - NEVER skip steps by jumping to URLs

  ⭐ CORRECT WORKFLOW (Proven to Work):
  Dashboard → Find Quotes Link → Click It → Search → View Stock → Click TRADE → Trading Form → Execute

  🔐 STEP 1-8: LOGIN & ACCESS DASHBOARD
  - Navigate to homepage (ONLY TIME YOU USE DIRECT URL)
  - Find and click "Login" link (usually top right)
  - Fill username: WALAEZZEDINE
  - Fill password: WALA@123
  - Click "Log me in" button
  - Dashboard loads with tour overlay
  - Click "Close Tour" button to dismiss

  🔍 STEP 9-11: GO TO QUOTES PAGE (USING VISIBLE ELEMENTS ONLY!)

  ⚠️ RESTRICTIONS:
  - The Trading/Equities page search doesn't work properly (console errors)
  - Instead, navigate to the QUOTES PAGE using visible links
  - DO NOT use browser_navigate with hardcoded quote URLs
  - MUST click visible navigation elements

  The correct path:
  - From dashboard, use browser_snapshot to see layout
  - Use browser_evaluate to FIND the "Stock/Fund Quotes" link by searching for visible text
  - Use browser_evaluate to GET its href if needed
  - Click the link using browser_click with the discovered ref
  - This takes you to Quotes page (URL will show automatically)
  - Quotes page is where stock search actually works

  ❌ FORBIDDEN: browser_navigate({'url': 'https://app.wallstreetsurvivor.com/quotes/quotes...'})
  ✅ ALLOWED: Find link, click it with browser_click or browser_evaluate

  📊 STEP 12-17: SEARCH FOR NVDA ON QUOTES PAGE
  - On Quotes page, take snapshot to find search input
  - Click on search input with placeholder "Search for a symbol or company"
  - Type "NVDA"
  - If "Show Result" button appears, click it
  - If search dropdown appears automatically, click on NVDA result
  - Nvidia stock page loads with:
    * Current price (large number)
    * Price change % (green/red)
    * Stock chart
    * News and analysis

  💭 STEP 18-27: READ & ANALYZE
  - READ: NVDA price, trend, chart direction
  - READ: Recent news, company announcements
  - ANALYZE: Bullish (price up, positive news) or Bearish (price down, negative news)?
  - DECIDE: BUY if bullish, SELL if bearish

  💰 STEP 28-40: EXECUTE TRADE (USING VISIBLE UI ONLY!)
  - Look for "TRADE" button on the stock page
  - Use browser_evaluate to find the TRADE button by text
  - Click "TRADE" button using browser_click
  - Trading form appears for NVDA
  - Enter Quantity: 10 shares
  - Click "Preview" button
  - Review order summary
  - Click "Confirm" button
  - Wait for confirmation message
  - Trade complete!

  ✅ KEY SUCCESS FACTORS
  1. Use Quotes page for stock lookup (find via visible link, NOT direct URL)
  2. Click links you discover, don't hardcode URLs
  3. Click TRADE button from stock details page using browser_evaluate
  4. This takes you to trading form
  5. Complete form → Confirm → Trade executed
  6. NEVER bypass steps with direct URL navigation

  ⚠️ WHEN YOU GET STUCK
  - If page looks blank: Use browser_evaluate to find elements
  - If search not visible: Try scrolling down
  - If search doesn't trigger: Try clicking "Show Result" or "Show Latest" button
  - If stuck navigating: Look for visible link text and click it, don't use URLs
  - If console errors appear: Ignore them, page still functions

max_steps: 65
headless: false
