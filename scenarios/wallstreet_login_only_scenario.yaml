name: Wall Street Survivor - Login Only Test
description: Test login flow without registration - validates credential auto-fill

objectif: Login to Wall Street Survivor dashboard with provided credentials

context:
  username: testuser_20260414
  password: WallStreet@2025

key_actions:
  - Navigate to login page
  - View login form with username and password fields
  - Login form fields are auto-filled with provided credentials
  - Click login button
  - Verify dashboard is accessible

success_criteria:
  - Login form fields populated with username and password
  - Login button clicked successfully
  - Redirected to dashboard
  - Portfolio page visible

steps:
  - step_1:
      description: Navigate to Wall Street Survivor login page
      action: browser_navigate to https://www.wallstreetsurvivor.com/members/login
      
  - step_2:
      description: Capture login form
      action: browser_snapshot
      expected_result: Login form visible with Username and Password fields
      
  - step_3:
      description: Login form should be auto-filled by system
      guidance: The system will automatically fill your credentials. Do NOT manually type them.
      guidance_detail: When you see "CREDENTIALS AUTO-FILLED" message, proceed to click login.
      
  - step_4:
      description: Click login button
      action: browser_click on 'Log me in' button
      expected_result: Login attempt initiated
      
  - step_5:
      description: Verify successful login
      action: browser_snapshot
      expected_result: Dashboard page loads, portfolio and portfolio selection are visible

strict_done_validation: true
