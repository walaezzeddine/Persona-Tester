name: "Wall Street Survivor - Login to Existing Account"
target_url: "https://www.wallstreetsurvivor.com/"

description: |
  Login to an existing Wall Street Survivor account:
  1. Navigate to Wall Street Survivor website
  2. Find and click the Login link
  3. Enter email and password
  4. Successfully authenticate
  5. Access the main dashboard/portfolio

constraints:
  time_limit: 180
  max_retries: 2

success_criteria:
  - "Successfully found the login form"
  - "Email and password fields filled correctly"
  - "Form submitted and authentication successful"
  - "Main dashboard is accessible after login"

abandon_criteria:
  - "Cannot find login link"
  - "Login form has unexpected structure"
  - "Authentication fails with invalid credentials"

key_actions:
  - "Step 1: Navigate to homepage"
  - "Step 2: Take snapshot to see page"
  - "Step 3: Find and click Login link"
  - "Step 4: Fill email field with provided credentials"
  - "Step 5: Fill password field with provided credentials"
  - "Step 6: Click Login/Submit button"
  - "Step 7: Wait for authentication"
  - "Step 8: Verify dashboard is visible"

site_guidance: |
  ⚠️ Wall Street Survivor is a Single Page Application (SPA)

  Navigation Behavior:
  - URLs use hash navigation: #/login, #/dashboard
  - Content loads dynamically without page reloads
  - Always use browser_snapshot after clicks to confirm state change

  Login Process Steps:
  1. Take snapshot of homepage
  2. Look for "Login", "Sign In", or "Log In" link (usually top right or navigation)
  3. Click the login link - URL will change to include /#/login
  4. Take snapshot to see login form
  5. Identify email and password input fields
  6. Use browser_fill_form to populate both fields
  7. Click Submit/Login button
  8. Take snapshot to confirm dashboard loads

  Form Filling:
  - Email field: Look for input with placeholder like "Email" or type="email"
  - Password field: Look for input with type="password"
  - Use browser_fill_form with field selectors or by index

  Expected Login Form Layout:
  - Email input (required)
  - Password input (required)
  - "Remember Me" checkbox (optional)
  - Login/Submit button
  - Possibly "Forgot Password" or "Register" links below

  After Successful Login:
  - Redirect to dashboard (URL becomes #/dashboard or similar)
  - See portfolio/account information
  - Navigation menu becomes available
  - User can access Courses, Research, Trading, etc.

  Common Issues:
  - If form doesn't submit: Check no validation errors shown
  - If redirected back to login: Invalid credentials or session issue
  - If blank screen: Wait and snapshot again, page may be loading
  - Use browser_evaluate with scrolling if needed to see full form
