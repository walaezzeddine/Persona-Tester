# Scénario de test : Comparaison de produits
# Ce fichier décrit le contexte du test (l'objectif vient du persona)

name: "comparaison_produits"
description: "Comparer plusieurs produits avant achat"

# NOTE: L'objectif spécifique est défini dans le fichier persona
# Ex: "Comparer au moins 2 produits, lire leurs détails, choisir le moins cher"

# Étapes attendues du funnel (pour le tracking)
funnel_steps:
  - name: "homepage"
    description: "Page d'accueil"
  - name: "product_list"
    description: "Liste des produits"
  - name: "product_detail_1"
    description: "Détail du produit 1"
  - name: "back_to_list"
    description: "Retour à la liste"
  - name: "product_detail_2"
    description: "Détail du produit 2"
  - name: "compare_decision"
    description: "Décision après comparaison"
  - name: "add_to_cart"
    description: "Ajout au panier"
  - name: "cart"
    description: "Panier"

# Critères de succès
success_criteria:
  - "Produit ajouté au panier après comparaison"
  - "Au moins 2 pages produit visitées"

# Critères d'abandon
abandon_criteria:
  - "Aucun produit dans le budget"
  - "Site inaccessible"
  - "Erreur 404 ou 500"

# Contraintes spécifiques au scénario
constraints:
  max_price: 400
  min_products_compared: 2
  currency: "Rs"
  category: "clothing"
