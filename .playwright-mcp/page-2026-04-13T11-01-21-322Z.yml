          - paragraph [ref=e209]: Now let’s explore Seeking Alpha’s Alpha Picks service in more detail.
          - heading "What You Get with Alpha Picks" [level=2] [ref=e210]
          - paragraph [ref=e211]: Hopefully those results got your attention. Now let me dive into the details about my newest best friend Alpha Picks.
          - heading "Quantitative Investing Made Easy" [level=3] [ref=e212]
          - paragraph [ref=e213]: Alpha Picks is designed to make investing easy! It is specifically for investors that don’t have the time to research stocks but rather just want to be told which stocks have the highest rating each month.
          - paragraph [ref=e214]: This service is for buy-and-hold investors. It is not for day traders. It is not for swing traders.
          - paragraph [ref=e215]: If you’re familiar with Seeking Alpha, you already know just how much cognitive firepower they bring to the table. If you aren’t familiar with Seeking Alpha, here’s a quick overview.
          - heading "How Seeking Alpha Seeks Alpha" [level=3] [ref=e216]
          - paragraph [ref=e217]: Seeking Alpha is a website, community, and crowdsourced research platform made by and for investors. The site hosts the world’s largest investing community—boasting a staggering 20 million visitors every month—and offers an unprecedented array of analyses, market-specific news, and investing tools that rival those found on Wall Street trading terminals.
          - paragraph [ref=e218]: In addition to all of the above, Seeking Alpha is also home to possibly the largest collection of crowdsourced investment analysis. This analysis is written, reviewed, and debated over by professional investors. Some 7,000 well-vetted contributors post over 10,000 investing ideas every month, each of which is reviewed by Seeking Alpha editors to make sure every post meets their quality standards.
          - paragraph [ref=e219]:
            - text: As if that weren’t enough, Seeking Alpha also hosts news, discussions, and data-driven analyses on small-cap stocks, commodities, ETFs, cryptocurrencies, and just about any other security on the market. And if you want to go even deeper,
            - link "Seeking Alpha Premium" [ref=e220] [cursor=pointer]:
              - /url: https://www.wallstreetsurvivor.com/seeking-alpha-review/
            - text: gives you access to a frankly insane amount of investing ideas, data visualizations, and author, quant, and dividend ratings—plus the ability to track the performance of individual authors.
          - paragraph [ref=e221]: "In other words: It’s quant heaven."
          - paragraph [ref=e222]: "Now that you have a sense of where their information is coming from, let’s get back to the reason we’re all here: Alpha Picks."
          - heading "What Makes Alpha Picks Different" [level=3] [ref=e223]
          - paragraph [ref=e224]: Finding great stocks to buy on Seeking Alpha can be a bit like panning for gold. It can take a while to sift through all the good stuff to get to the truly great, and there’s so much valuable information that the market might have moved on by the time you’re done reading through the research, scanning the charts, and checking out all the discussions.
          - paragraph [ref=e225]: "If you’re thinking that it’d be great if Seeking Alpha had a service that did all the gold panning for you and just handed you the biggest, shiniest nuggets, guess what: they’re two steps ahead of you."
          - paragraph [ref=e226]:
            - text: Alpha Picks is a subscription service that Seeking Alpha designed for that exact purpose. It takes all the information from the
            - strong [ref=e227]: Seeking Alpha Quant model and filters it all down to the two stocks with the biggest potential for positive share price growth
            - text: every month.
          - paragraph [ref=e228]: "Here’s what you need to know about their Quant model:"
          - list [ref=e229]:
            - listitem [ref=e230]:
              - strong [ref=e231]: "It is Backtested:"
              - list [ref=e232]:
                - listitem [ref=e233]: Backtested from 12/31/2010 to 8/31/2025
                - listitem [ref=e234]: Portfolio compounded monthly with a start of $10,000 and $1,000 added monthly
                - listitem [ref=e235]: Holding purchased in equal weights and rebalanced
            - listitem [ref=e236]:
              - strong [ref=e237]: "Stock Criteria:"
              - list [ref=e238]:
                - listitem [ref=e239]:
                  - text: Each stock hold a
                  - strong [ref=e240]: Strong Buy
                  - text: Quant rating for at least 75 days
                - listitem [ref=e241]: Market cap greater than $500 Million
                - listitem [ref=e242]: Stock price greater than $10
            - listitem [ref=e243]:
              - strong [ref=e244]: Portfolio Process
              - list [ref=e245]:
                - listitem [ref=e246]: One new pick the first trading day of the month; second pick on or after the 15th
                - listitem [ref=e247]: Stocks will be sold when they become rated a Sell or Strong Sell, or remain Neutral for 180 days
          - paragraph [ref=e248]:
            - text: A lot of stock picking services hide their methodology for any number of reasons—to build mystique, because they’re afraid someone will steal their proprietary recipe, because they identify with the Wizard of Oz from
            - emphasis [ref=e249]: The Wizard of Oz
            - text: ", etc—but not Alpha picks. Their methodology and stock criteria are fully transparent, and their results speak for themselves."
          - paragraph [ref=e250]: "So if you take a look back at how their Top Rated Quant Stocks have performed since 2010 versus Wall Street Analysts and versus the S&P500, you get this mind-blowing chart (note their Strong Buy Recommendations’ Total Return vs S&P500 Return over the same period):"
          - figure [ref=e251]:
            - img "Seeking Alpha's Quant Rating performance as of January 2026" [ref=e252]
          - paragraph [ref=e253]: Although they are packaging Alpha Picks as a new product for 2022, Seeking Alpha’s Quant Rating has been picking top stocks for years. With Alpha Picks, you are getting the cream of the crop of their highest rated Quant Stocks.
          - paragraph [ref=e254]: You don’t have to be a mathematician to appreciate numbers like that.
          - paragraph [ref=e255]: "In terms of their buy criteria, here is there summary:"
          - heading "Buy Criteria" [level=4] [ref=e256]
          - paragraph [ref=e257]: Alpha Picks uses a data-driven process to identify the most appropriate stock picks from Seeking Alpha Premium’s ‘Strong Buy’ quant recommendations. We pick two ‘Strong Buy’ rated stocks per month. One pick is added on the first trading day of the month and the other is added on the 15th of the month, or the closest trading day after it.
          - paragraph [ref=e258]: "At the time of publication, each pick must meet the following criteria:"
          - list [ref=e259]:
            - listitem [ref=e260]: ‘Strong Buy’ quant rating for at least 75 consecutive days
            - listitem [ref=e261]: A U.S. Common Stock (i.e. No ADRs)
            - listitem [ref=e262]: Is not a REIT
            - listitem [ref=e263]: Has a 3 month average market capitalization greater than $500M
            - listitem [ref=e264]: Has a stock price greater than $10
            - listitem [ref=e265]: Has not been recommended in the past 1 year.
          - paragraph [ref=e266]: "And in case you are wondering, here is there SELL criteria:"
          - heading "When They Sell" [level=4] [ref=e267]
          - paragraph [ref=e268]: "We notify subscribers via email when we close out or reduce a position in the portfolio. We sell the entire position in a stock if any of the following occur:"
          - list [ref=e269]:
            - listitem [ref=e270]: The rating falls to ‘Sell’ or ‘Strong Sell’.
            - listitem [ref=e271]: The rating falls to ‘Hold’ and remains at ‘Hold’ for 180 consecutive days (as long as the stock is not a ‘winner’ — see below).
            - listitem [ref=e272]: The company announces an M&A event in which it is the target, or it announces a merger of equals.
            - listitem [ref=e273]: If a stock’s position reaches 15% of the portfolio, it will be reduced to 10% to avoid a concentration risk. The proceeds will be distributed on an equal-weighted basis among the other holdings in the portfolio.
          - paragraph [ref=e274]: Stocks rated as a STRONG BUY by Seeking Alpha’s quant model, when back tested to 2010, had a total return of $250+k compared to $52k from the S&P500. This means Alpha Picks would have outperformed the S&P 500 by almost 5x over the past 14 years.
          - paragraph [ref=e275]: So, if you are seeking ALPHA, then there it is!
          - paragraph [ref=e276]: And now, Seeking Alpha is making it easy for you to find the best of the best STRONG BUY stocks!
