          - heading "Why I Subscribed to Alpha Picks" [level=2] [ref=e160]
          - paragraph [ref=e161]: I had been a free member of Seeking Alpha for over 12 years and finally signed up for Premium in 2020. Since then, I have grown to like them more and more as I find their quant rating analysis to be a good indicator for future stock performance.
          - paragraph [ref=e162]:
            - text: So when they launched their “
            - strong [ref=e163]: Alpha Picks
            - text: ” service on July 1, 2022 I couldn’t resist and I subscribed so that I could share my results with my Wall Street Survivor audience.
          - paragraph [ref=e164]:
            - text: Many investors prefer to put the money in their
            - link "401(k)" [ref=e165] [cursor=pointer]:
              - /url: https://www.investopedia.com/terms/1/401kplan.asp
            - text: in mutual funds or hand it over to money managers who may or may not know what they’re doing. There’s nothing wrong with that. Not everyone has the time, expertise, or confidence to take their portfolio into their own hands.
          - paragraph [ref=e166]:
            - text: I, however, don’t hand my money over to mutual funds or pay someone to manage my money. I prefer to
            - strong [ref=e167]: BEAT the market
            - text: by selecting top stocks that will likely outperform the market.
          - paragraph [ref=e168]: And so far, Alpha Picks is doing just that!
          - heading "Alpha Picks Performance as of March 1, 2026 (from their site)" [level=2] [ref=e169]
          - paragraph [ref=e170]: "Seeking Alpha calculations the performance of their Alpha Picks as follows:"
          - figure [ref=e172]:
            - img "Seeking Alpha Picks return as of March 1, 2026 based on their calculation." [ref=e173]
          - paragraph [ref=e174]: As you can see above, when you login to Alpha Picks you see their calculation of performance. I am not supposed to show their most recent picks, but you can see at least 5 of their latest picks are easily beating the SPY. They say had you subscribed to Alpha Picks in July 2022 and bought each of their picks you would have that 296+% return vs 82% for the market.
          - paragraph [ref=e175]: My calculations differ so I called Seeking Alpha and had several conversations with their CFA that tracks their performance. They calculate their returns on a “portfolio” approach whereas I am calculating the average return of each of their picks. Their portfolio approach assumes you started with $100,000 and purchased equal dollar amounts of their first 6 stocks in July of 2022. Then when they released their 7th pick, they assume you sell a bit of each of the first 6 stocks and to have an equal weight (dollar amount) in all 7 stocks. Then with each new pick you sell off a bit of the holdings to buy the new stock picks, etc. So they are rebalancing their portfolio with each new pick, and I am assuming you add new cash each month and keep buying equal dollar amounts of all new stocks.
          - paragraph
          - heading "Alpha’s Picks Performance (from my experience)" [level=2] [ref=e176]
          - paragraph [ref=e177]: As you can see from the chart below, Alpha Picks had phenomenal returns in 2022, 2023, 2024 and 2025 with a very high accuracy rate on their stock picks. Their 2026 picks are doing just fine too beating the market by 4.3% already this year.
