          - paragraph [ref=e113]: But, before I go deeper into this review, let’s make sure we are all on the same page.
          - paragraph [ref=e114]: What does “ALPHA” mean in the investing world? Simply put, “alpha” is the excess return over a benchmark’s return. For example, if stock ABC is up 15% for the year and the S&P500 is up 12%, then stock ABC provided 3% excess return above the benchmark and this is your ALPHA. So investors love ALPHA! Everyone wants to beat the market.
