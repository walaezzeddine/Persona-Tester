          - paragraph [ref=e141]: I have been investing in the stock market for over 40 years and have subscribed to dozens of stock picking services over these years. In fact, right now, I am a subscriber to Seeking Alpha Premium, Alpha Picks, Motley Fool Stock Advisor, Rule Breakers, Real Estate Advisor, Hidden Gems, Zacks Premium, Zacks Home Run Investor, Zacks Top 10 Stocks, Jim Cramer, Investor Business Daily, Moby, Predictive Services, 3 of Bernie Schaeffer’s options services and a couple of other options newsletters.
