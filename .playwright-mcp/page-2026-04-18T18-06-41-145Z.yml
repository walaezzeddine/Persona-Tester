              - listitem [ref=e227]: The remaining 2% of rewards are cash payments between $10 and $200.
              - listitem [ref=e228]: 100% chance of getting FREE cash for each friend that signs up!
            - paragraph [ref=e229]: As for the value of each share, that highly depends on the movement of the market.
            - paragraph [ref=e230]:
              - text: But even if you receive a deposit of $10 or less –
              - strong [ref=e231]: it is still free money!
            - paragraph [ref=e232]: And if you don’t like the stocks you pick from the list—SELL THEM and BUY WHAT YOU WANT! Remember, there is no commission!
            - heading "How Does Robinhood Make Money if You Trade for Free?" [level=2] [ref=e233]
            - figure [ref=e235]:
              - img "Robinhood Cover" [ref=e236]
            - paragraph [ref=e237]: You may be skeptical about how a company can offer free stock trading?
            - paragraph [ref=e238]: First, Robinhood makes money by charging a monthly fee if you upgrade your account to a Robinhood Gold account. With Robinhood Gold, those who upgrade can invest $1,000 on margin for free, and invest on margin with a lower interest rate for amounts over $1,000, and Gold accounts earn a few extra % points interest on their cash.
            - paragraph [ref=e239]: They also get access to after-hours trading, as well as a higher APY on the brokerage cash sweep program, bigger instant deposits, and more in-depth research and market data. In short, Robinhood Gold is similar to a margin account with some fantastic extra features. A margin account allows you to borrow money to invest.
            - paragraph [ref=e240]:
              - text: However, if you are new to investing (or have never heard of a margin account),
              - strong [ref=e241]: you probably should not borrow money to invest!
            - paragraph [ref=e242]:
              - text: Secondly,
              - strong [ref=e243]: Robinhood accepts payment for order flow
              - text: ", which means that they route your trades to certain market makers in exchange for a fee."
            - paragraph [ref=e244]:
              - text: Thirdly,
              - strong [ref=e245]: Robinhood also does not pay interest on your account balance which represents another way for the company to make money
              - text: . However, Robinhood DOES offer an optional brokerage cash sweep program that takes your uninvested cash and places it in several banks to allow you to earn interest.
            - paragraph [ref=e246]: So, is this business model sustainable? Only time will tell! But with 25,000,000 customers, the answer has got to be YES. Also, keep in mind the company is backed by some of the biggest Venture Capital funds on the West Coast, so they have plenty of access to funding.
            - paragraph [ref=e247]: But if the company were to go out of business, you would be able to transfer your shares or cash out because the accounts, like all bank accounts, are insured by the U.S. government for up to $500,000.
            - paragraph [ref=e248]: So, no matter what Robinhood does – you are good!
