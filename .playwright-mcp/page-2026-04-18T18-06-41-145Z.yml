            - heading "Robinhood Overview" [level=2] [ref=e159]
            - paragraph [ref=e160]:
              - text: Robinhood is a free trading app that allows you to trade stocks
              - strong [ref=e161]: without paying commissions.
            - paragraph [ref=e162]: Instead of paying $8 to your brokerage per transaction, you can trade 100% free of charge.
            - paragraph [ref=e163]: "With Robinhood, you can buy and sell the following types of securities:"
            - list [ref=e164]:
              - listitem [ref=e165]: Shares of any U.S. stocks
              - listitem [ref=e166]: Exchange-Traded Funds (ETFs)
              - listitem [ref=e167]: Options
              - listitem [ref=e168]: Cryptocurrency
              - listitem [ref=e169]: And more!
            - paragraph [ref=e170]: Robinhood offers regular, taxable brokerage accounts as well as tax-advantaged retirement accounts.
            - paragraph [ref=e171]: When you open and contribute to a traditional or Roth IRA, Robinhood will match 1% of your contributions!
            - paragraph [ref=e172]: We ourselves have been using Robinhood for over 10 years now and have never once had an issue. In 2014 we opened a Robinhood account, connected it to our checking account, and transferred $500. We got our free stock as promised. We then made a few trades, referred our friends, got more shares for free, then sold a few stocks, and then transferred cash back to our checking account. No problems. No delays. Worked like a charm.
            - paragraph [ref=e173]: Since then, we have added more cash, and we now have made over 200 trades–no worries.
            - paragraph [ref=e174]: With Robinhood, you can buy shares of stock without worrying about transaction fees.
            - paragraph [ref=e175]: There are no arbitrary account minimums – so you do not need thousands of dollars to invest. You can open your account with just $10.
            - paragraph [ref=e176]: And remember, the earlier you start investing, the better off you will be in the future.
            - heading "How Do I Get up to $1,700 in FREE STOCK with Robinhood?" [level=2] [ref=e177]
            - paragraph [ref=e178]: To open a Robinhood account, all you need is your name, address, and email. To get your free stock you will need to fund your account with at least $10 within a few days of opening so you will also need your bank account routing and account number.
            - paragraph [ref=e179]:
              - text: As its current promotion, Robinhood will immediately give you FREE MONEY (between $5 and $200) to invest in a set list of stocks when you open a new account. You will be given your unique referral link. You will receive more free money (again valued at $5 to $200) for each person you refer. The more people you refer, the more you get up to a max of $1,500 a year.
              - strong [ref=e180]: To learn more, visit Robinhood's free stock promo page below.
            - link "Is Robinhood Safe? Get Free Stock" [ref=e181] [cursor=pointer]:
              - /url: /go/robinhoodfreestock
              - img "Is Robinhood Safe? Get Free Stock" [ref=e182]
            - paragraph [ref=e183]:
              - strong [ref=e184]: Why do they give away so much free stock?
              - text: Because they spend their advertising dollars this way instead of buying TV, radio, print, or online ads! They WANT you to refer friends!
            - paragraph [ref=e185]: We also like how this app appeals to younger investors because you can use it on your smartphone.
            - paragraph [ref=e186]: This means you can view your investments and make trades anywhere and anytime.
            - paragraph [ref=e187]: Sounds pretty good, right? But you may be wondering how is all of this possible?
            - heading "How to Get Your First Free Share of Stock" [level=2] [ref=e188]
