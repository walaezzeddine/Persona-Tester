            - paragraph [ref=e148]: But here is the one thing you have to understand. Notice it says “between $5 and $200 cash value.” Robinhood’s current offer as of May, 2025 says most will receive a value of between $5 and $10. But if you refer your friends and family you will get more free stock and increase your chance of getting $200. Two years ago, one of my stocks that I got for referring a friend was a free share of Microsoft, back when it was about $200 a share. So they absolutely do give stocks up to $200.
