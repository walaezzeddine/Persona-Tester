  - dialog "Cookies et choix publicitaires" [ref=e3]:
    - generic [ref=e4]:
      - heading "Cookies et choix publicitaires" [level=4] [ref=e5]
      - paragraph [ref=e6]:
        - text: Si vous y consentez, nous pourrons utiliser vos informations personnelles provenant de ces
        - link "Services Amazon" [ref=e7] [cursor=pointer]:
          - /url: /gp/help/customer/display.html?nodeId=T1fdzp9ecINEaVWTyY
        - text: pour personnaliser les publicités que nous vous proposons sur d'autres services et sur des sites tiers. Par exemple, nous pourrons utiliser votre historique des vidéos regardées sur Prime Video pour personnaliser les publicités que nous affichons sur nos Boutiques ou sur Fire TV. Nous pourrons également utiliser des informations personnelles provenant de tiers (comme des informations démographiques, par exemple).
      - paragraph [ref=e8]:
        - text: De plus, si vous y consentez, nous utiliserons également des cookies pour compléter votre expérience d'achat dans les boutiques Amazon, comme indiqué dans notre
        - link "Politique relative aux cookies" [ref=e9] [cursor=pointer]:
          - /url: /gp/help/customer/display.html?nodeId=201890250
        - text: . Votre choix s'applique à l'utilisation des cookies publicitaires internes et tiers sur ce service. Les cookies stockent des informations standard relatives à un appareil, telles qu'un identifiant unique, ou y accèdent. Les
        - link "135 tiers" [ref=e10] [cursor=pointer]:
          - /url: /privacyprefs/retail/partners
        - text: qui utilisent des cookies sur ce service le font dans le but d'afficher et de mesurer des publicités personnalisées, de générer des informations sur l'audience, et de développer et d'améliorer des produits.
      - paragraph [ref=e11]:
        - text: Dans tous les cas, nous utilisons des cookies et des outils similaires, qui sont nécessaires pour vous permettre d'effectuer des achats, d'améliorer votre expérience d'achat et de fournir nos services, comme indiqué dans notre
        - link "Politique relative aux cookies" [ref=e12] [cursor=pointer]:
          - /url: /gp/help/customer/display.html?nodeId=201890250
        - text: . Nous utilisons également ces cookies pour comprendre comment les clients utilisent nos services (par exemple, en mesurant les visites de sites) afin de pouvoir apporter des améliorations. Cliquez sur Refuser pour refuser, ou sur Personnaliser pour faire des choix publicitaires plus détaillés, ou pour en savoir plus. Vous pouvez modifier vos choix à tout moment en accédant à la section
        - link "Cookies et choix publicitaires" [ref=e13] [cursor=pointer]:
          - /url: /privacyprefs/retail?oCT=ads&ref_=portal_banner_cpp
        - text: . Pour en savoir plus sur la manière dont Amazon utilise les cookies, les publicités basées sur vos centres d’intérêt, et les informations personnelles, telles que l'historique des commandes sur la Boutique ou l'historique des vidéos regardées, et à quelles fins, consultez notre
        - link "Déclaration de confidentialité" [ref=e14] [cursor=pointer]:
          - /url: /gp/help/customer/display.html?nodeId=201909010
        - text: ", notre"
        - link "Politique relative aux cookies" [ref=e15] [cursor=pointer]:
          - /url: /gp/help/customer/display.html?nodeId=201890250
        - text: et notre
        - link "avis relatif aux publicités basées sur les centres d’intérêt" [ref=e16] [cursor=pointer]:
          - /url: /gp/help/customer/display.html?nodeId=G64JFZVFDY66XG9K
        - text: .
