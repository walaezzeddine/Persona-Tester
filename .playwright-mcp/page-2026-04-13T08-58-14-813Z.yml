          - paragraph [ref=e689]: Over the last 3 years, Seeking Alpha’s Alpha Picks has stormed onto the scene and is truly impressive so far, easily beating all of the other services we follow on both our 1 year ranking and our 3 year ranking. It relies on Seeking Alpha’s proprietary Quant Rating system and this Quant Rating appears (academic study at University of Kentucky) to give investors an edge in forecasting future price movements. My analysis above certainly confirms it. Stocks with the highest Quant Rating significantly outperform the market; and stocks with the lowest Quant Rating really, quite frankly, suck!
