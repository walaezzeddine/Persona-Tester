            - listitem [ref=e653]: The price is extremely reasonable AND they offer a MONEY BACK GUARANTEE and they have a toll-free number for support. They are so confident in their service that they encourage you to try it and get their next 2 stock picks–then you can cancel if you aren’t happy and get your money back. Normally it is $199 a year, but if you are a new customer you can get the next 12 months of their picks for just $99.
