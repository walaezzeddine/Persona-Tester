          - separator [ref=e89]
          - paragraph [ref=e90]: My job here at WallStreetSurvivor is to purchase these investment newsletters, track the performance of all their stock picks, and then share my analysis of the performance of all these services with our readers. I have been investing in the stock market for over 30 years, I have an MBA, and I helped launch this site in 2007 to share my analysis and help people make better investing decisions.
          - paragraph [ref=e91]: Our goal here at WallStreetSurvivor is to help our readers learn how to invest and how to make money in the stock market. Most people are so busy that they don’t have time to do thorough stock research.
          - paragraph [ref=e92]: So let’s review the performance of those people that make a living researching and picking stocks, selling stock subscriptions, and find out which stock newsletters are worth it.
          - generic [ref=e93]:
            - paragraph [ref=e94]: Just to be clear, we are not brokers and licensed to give advice, but we can share our analysis of stock newsletters and their performance.
            - heading "Best Stock Newsletter Ranking Methodology" [level=2] [ref=e95]
            - paragraph [ref=e96]:
              - text: In this ranking of the top performing stock newsletters, I stick to the facts and share my data. Over the last 30 years I have subscribed to 100+
              - strong [ref=e97]: stock newsletters,
              - text: various software screeners, and tested a variety of charting tools. I am currently subscribed to about 25 stock and investment newsletters priced under $500 per year.
            - paragraph [ref=e98]:
              - text: In this
              - strong [ref=e99]: April 5, 2026
              - text: "analysis of the best stock and investment newsletters I will share with you:"
            - list [ref=e100]:
              - listitem [ref=e101]: the performance (percentage return) of all of their last 12 months of picks thru April 5, 2026
              - listitem [ref=e102]: the performance of their last 3 years of picks
              - listitem [ref=e103]: and, the details of their performance of their 2025, 2024, and 2023 stock picks.
          - paragraph [ref=e104]: First, I calculate the last 12 months’ return of each stock pick from each of the newsletters that I follow and then I average each newsletters’ picks.
          - paragraph [ref=e105]:
            - text: I then calculate the return of the S&P500 from the date of each pick through April 5, 2026 (or the date they were sold) and compare each stock pick’s performance versus the S&P500 over the same time to get the “excess return” over the market of each stock pick. FYI–Just to be clear….While the S&P500 is up 63% since early 2023 it is down 4% since December 2025, so the
            - emphasis [ref=e106]: average
            - text: return over each of the last 36 months is actually 18%.
          - paragraph [ref=e107]:
            - text: It is important to focus on the “Return vs the S&P500” or excess return over the S&P 500 because that is the what every investor wants–to beat the market consistently. If you just want to
            - emphasis [ref=e108]: match the S&P
            - text: ", then just buy an index mutual fund or ETF."
          - paragraph [ref=e110]:
            - text: But if you want to
            - strong [ref=e111]:
              - emphasis [ref=e112]: beat the market
            - text: ", then keep reading. You will"
            - strong [ref=e113]: see how you could have beat the market by 60+% over the last 3 years!
          - paragraph [ref=e114]: Look at this 12 month ranking and then keep scrolling to see the latest 3 year ranking–this is the one that is the most valuable!
          - generic [ref=e115]:
            - separator [ref=e116]
            - heading "Stock Newsletter Rankings Based on Last 12 Months of Stock Picks as of April 5, 2026" [level=2] [ref=e117]
            - paragraph [ref=e118]: This is a fun list to look at. Everyone wants to know who has the hottest stock picks over the last 12 months and how much money you could have made had you subscribed a year ago.
            - paragraph [ref=e119]: Actually, to be exact, I am focusing on BEATING the market–so how stock picks have done versus the S&P500. You can invest in index ETFs for free and match the market, so you should only be paying for services that BEAT the market.
          - paragraph [ref=e120]: Well, here is the answer in the category of stock newsletters that cost less than $500 per year.
          - paragraph [ref=e121]:
            - img "Best investing newsletters as of April 5, 2026" [ref=e122]
          - paragraph [ref=e123]: Zacks Top 10 comes in first place with 10 picks with an average return of 6.7% while the market was down 4.6%, thereby beating the S&P500 by 11.3%. They accomplished this by having 5 picks with double digit returns while the market is down. They did have one pick that is already down 26%, but 7 out of 10 of their picks are up. This service works by simply picking the top 10 stocks on Zacks Ranking system and buying them the first day of January and holding them the entire year and selling them on the last day; and then repeating each year. So no more stock picks from this service until the end of the year.
          - paragraph [ref=e124]: The second service is also a Zacks product. Home Run Investor has 1 pick that is up 310% in the last 12 months. They picked LASR which has gone from $14.68 to over $60 in the last 12 months. On the negative side, however, they made 42 picks and only 43% are profitable.
          - paragraph [ref=e125]: The Dogs of the Dow strategy is a surprising 3rd place. This strategy also just picks 10 stocks on the first of the year and has not done that well in the last 10 years. But this year dividend yield is attractive so these stocks have gone up in 2026.
          - paragraph [ref=e126]:
            - text: In 4th place, you can see
            - link "Seeking Alpha's Alpha Picks" [ref=e127] [cursor=pointer]:
              - /url: /go/bsin-alphapicks/?sub2=best-investment-newsletters,src=,cmp=,med=
              - strong [ref=e128]: Seeking Alpha's Alpha Picks
            - text: has 24 stock recommendations over the last 12 months, the average return of those picks is 24.8% and they are beating the market by 7.2%. Their biggest winner is up 145% and 71% of their picks are profitable. Because Alpha Picks makes 24 picks a year and so many are profitable, even without the 110% winner the service is still beating the market by 2%–so that’s a great sign of consistency.
            - strong [ref=e129]: "HINT: Seeking Alpha is the winner based on the last 3 years so that is another good sign."
            - text: Seventeen of their 24 picks are profitable for 71% win-rate and this is becoming a pattern as you will see below when we look at 3 year performance below. This service retails for $499 a year so it easily would have
            - strong [ref=e130]: paid for itself (ie, beat the market) if you had invested at least $7,000 in the market in 2025 (7% of 7,000 is $490 which is the cost of the service).
            - text: You can even
            - link "save $50 now Seeking Alpha's Alpha Picks on this promo page" [ref=e131] [cursor=pointer]:
