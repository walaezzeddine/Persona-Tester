            - heading "Stock Newsletter Rank Based on Last 3 Years of Stock Picks" [level=2] [ref=e142]
            - paragraph [ref=e143]: While impressive, that chart and those calculations above were based on just one year of stock picks.
            - paragraph [ref=e144]:
              - text: So now let’s see what happens when we expand our horizon to their
