              - strong [ref=e132]: save $50 now Seeking Alpha's Alpha Picks on this promo page
            - text: .
          - paragraph [ref=e133]: Tipranks, Jim Cramer’s Action Alerts Plus and Investors Business Daily Leaderboard (IBD) are also doing well for the last 12 months but all with lower overall percentage of winners.
          - paragraph [ref=e134]:
            - text: Motley Fool services have had a decent 2025 but they are struggling over this 12 month period. They remain a crowd favorite as they are generally heavy into technology and we all know tech is really taking a hit so far this year. The Motley Fool services generally do very well over the long term and is a great place to start. Their services are frequently on sale so get the
            - link "best Motley Fool Discounts here" [ref=e135] [cursor=pointer]:
              - /url: https://www.wallstreetsurvivor.com/best-seeking-alpha-discounts-promo-codes/?utm_source=bin
            - text: .
          - paragraph [ref=e136]:
            - strong [ref=e137]: Notice that only 10 of these services were profitable given the recent downturn in the market.
            - text: And congrats to those 10 that are actually helping you beat the market. I didn’t bother listing the others that I follow that are NOT profitable.
          - generic [ref=e138]:
            - paragraph [ref=e139]:
              - text: But if you have ever been around any stock broker and stock newsletter, you know that “past performance does not guarantee future results.”
              - strong [ref=e140]: So let’s looks at 3 year performance do get more comfortable in finding the best service…
