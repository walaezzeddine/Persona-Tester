          - paragraph [ref=e381]: "Based on my analysis, the best performing stock newsletters over the last 3 years are:"
          - list [ref=e382]:
            - listitem [ref=e383]:
              - strong [ref=e384]: Seeking Alpha’s Alpha Picks
              - text: ": This relatively new service has an average return of 93% which is beating the market by 75%, 72% of their 72 picks are profitable and 14 have already doubled."
            - listitem [ref=e385]:
              - strong [ref=e386]: "Zacks Value Investor:"
              - text: Not a very active service with only 12-15 picks a year; only 53% of their last 3 years of picks have been profitable but those that are have propelled them into 2nd place on my 3 year list.
            - listitem [ref=e387]:
              - strong [ref=e388]: Zacks Top 10
              - text: picks are doing well with 74% profitable and are beating the market by 19%. This service just releases picks are January 1st of each year, sells them on December 31st. Nothing to do here in middle of year.
            - listitem [ref=e389]:
              - strong [ref=e390]: Cramer’s Action Alerts Plus
              - text: are beating the market by 5%. You gotta hand it to Jim! But 360 trades in 3 years?
            - listitem [ref=e391]:
              - strong [ref=e392]: TipRanks
              - text: are consistently in the top of the list and these 152 picks are beating the market by 5.4%. This service has moderate turnover in their picks as the average holding period is only about 5 months.
            - listitem [ref=e393]: "Zacks Home Run Investor: A newcomer to this list thanks to one of their 2023 picks hitting a 309% return."
            - listitem [ref=e394]:
              - strong [ref=e395]: Moby Premium
              - text: ": This fast growing service has an average return of 19% which is just in a tie with the market right now, 55% of their 300+picks are profitable and 56 of their 376 stock picks have already doubled."
            - listitem [ref=e396]: "Investors Business Daily Leaderboard service, or at least it’s ETF pulls in at #8 on my list but not beating the market."
            - listitem [ref=e397]:
              - strong [ref=e398]: "Dogs of the Dow Strategy:"
              - text: This is the first time that this strategy has made the 3 year top 10 list. Buying the 10 highest dividend yield of the Dow 30 at the beginning of the year and then selling on December 31st and then buying next year’s high dividend yield has been a hit or miss proposition the last decade. But this year 70 were profitable which lifted their 3 year average.
            - listitem [ref=e399]:
              - strong [ref=e400]: Motley Fool’s Stock Advisor
              - text: ": This popular service continues to do well with a 7% return which is not beating the market, 59% of their 72 picks are profitable and 10 have already doubled. Like I said earlier, their picks tend to take some time to get moving."
            - listitem [ref=e401]: The others just are not beating the S&P500, sorry.
          - heading "Here’s My Detail Calculations for This Ranking" [level=3] [ref=e403]
          - paragraph [ref=e404]: Here’s a whole a whole table of numbers that I keep track of in Excel. Take your time and absorb what each row and each column is telling you. There is a lot of data here.
          - paragraph [ref=e405]: You can see how each is performing over the last 12 months, the last 3 years, and the average of the last 3 years. You can also see number of picks that are profitable and number of picks that have at least doubled. You can also see the maximum percentage gainer and the worst performing stock.
          - paragraph [ref=e406]:
            - img "Best Stock Newsletters as of April 5, 2026 for the last 3 years." [ref=e407]
          - paragraph [ref=e408]:
            - img "Best stock newsletters part 2" [ref=e409]
          - paragraph [ref=e410]:
            - generic [ref=e411]:
              - text: In this table above you see the Seeking Alpha’s Alpha Picks is the leader when looking at the last 3 years of stock picks. They are
              - strong [ref=e412]: consistently beating the market each and every year
              - text: and that is why these have risen to the top over the last 3 years.
          - paragraph [ref=e413]:
            - text: "The #1 stock service over the last 3 years is Seeking Alpha’s Alpha Picks which cost $499 a year. They also have Seeking Alpha Premium for $299. If you want better picks you need Alpha Picks; if you want to get their Quant Rating on your current stocks, link your portfolio, and get alerts when your stocks’ Quant Ratings change then you need Seeking Alpha Premium. I subscribe to both! You can read this in-depth"
            - link "Seeking Alpha-Is it Worth It?" [ref=e414] [cursor=pointer]:
              - /url: https://www.wallstreetsurvivor.com/is-seeking-alpha-worth-it/
            - text: article or see my updated post of the
            - link "best Seeking Alpha discounts" [ref=e415] [cursor=pointer]:
              - /url: https://www.wallstreetsurvivor.com/best-seeking-alpha-discounts-promo-codes/?utm_source=bin
            - text: .
          - paragraph [ref=e416]: "The #2 service, Zacks Value Investor’s 3 year average is great, but it is due to just one pick (VRT) in 2023 that is up 1,134%. That stock went from $21 to $261 in 3 years!"
          - paragraph [ref=e417]: Zacks Top 10 service picks 10 stocks with their highest Zacks Rank on January 1st of every year and then sells them at year end. One of their 2024 picks was up 170% but their 2023 stocks underperformed the market. Too much inconsistency compared to some of these others and nothing recommended 364 days of the year.
          - paragraph [ref=e418]: Jim Cramer’s Action Alerts Plus service that he sells through TheStreet.com is a solid 4th place and Jim has beat the market every year for the last 3 years. He is averaging over 110 buys a year so it will keep you busy.
          - paragraph [ref=e419]: Tipranks is really starting to catch our eye with their performance and they come in 5th place over the last 3 years. This is more of a short terms service as they tend to hold stocks for only a few months but they do pick some big winners. Their weakness is only 57% were profitable over this 3 year period.
          - paragraph [ref=e420]:
            - text: The Moby Premium stock picks are from a group of ex-Wall Street Hedge Fund managers and CFAs. This service was launched in 2019 and their picks are doing very well, especially in 2023 when they picked Palantir and now it is up 2,000%. Their service cost $199 a year but you can
            - link "get their next pick free" [ref=e421] [cursor=pointer]:
              - /url: /go/bin-moby
            - text: and get full access to their site/app to see if you want to subscribe for only $99 for your first year. This is a great place to start for beginners, and their mobile app is full of great analysis, insight, and information. But with 150 picks a year it is hard to follow.
          - paragraph [ref=e422]:
            - text: The ever popular Motley Fool Stock Advisor comes in eleventh place. They have an amazing track record, struggled a bit with their picks during Covid, but have resumed their winning ways. This
            - link "Stock Advisor service costs only $99 for new subscribers" [ref=e423] [cursor=pointer]:
              - /url: /go/fool-best60
            - text: and has a 30 day money back guarantee so this is still a favorite of many. In fact, they claim they have over 500,000 subscribers to this service. They have beat the market every year here, but had one loser of 82% that they didn’t tell you to sell. The lesson here is to use stop losses of 15-25% and your performance would be much better.
          - paragraph [ref=e424]: Congratulations to all the top stock newsletters of Seeking Alpha, Zacks Value Investor, Zacks Top 10, TipRanks, Action Alerts Plus, for solidly and consistently beating the market over 3 years. Keep reading to learn more details about each service.
          - separator [ref=e425]
          - heading "Summary of the Best Stock Newsletters Based on Last 3 Years of Stock Picks" [level=2] [ref=e426]
