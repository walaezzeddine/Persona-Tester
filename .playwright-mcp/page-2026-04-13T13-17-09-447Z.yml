            - 'heading "Beginner Investing: 10 Steps to Start Investing the Right Way" [level=1] [ref=e76]'
            - generic [ref=e77]:
              - generic [ref=e79]:
                - text: Written by
                - link "Mark Brookshire, MBA" [ref=e80] [cursor=pointer]:
                  - /url: https://www.wallstreetsurvivor.com/author/mbrookshire/
              - text: "/Last Updated: November 3, 2025"
            - generic [ref=e81]: Advertising Disclosure
          - img "investing for beginners" [ref=e83]
          - generic [ref=e84]:
            - paragraph [ref=e85]: I’ve spent the last 30 years of my life trying to help beginners learn to invest in the stock market.
            - paragraph [ref=e86]: "My main message is this:"
            - list [ref=e87]:
              - listitem [ref=e88]:
                - text: Stop thinking about beginning to invest in stocks, stop talking about it, and just
                - strong [ref=e89]: start investing now.
                - text: The sooner you get started, the better off you will be.
              - listitem [ref=e90]: Start educating yourself. It’s easier than you think. There are plenty of free resources to help you get started (see my list of 10 items below).
              - listitem [ref=e91]: "Don’t get stock tips from your friends and don’t chase rumors. Get your stock picks from a proven source (see #9 below)."
              - listitem [ref=e92]: Develop a systematic plan of creating a savings/emergency account, paying off high interest rate credit cards, and investing in a fixed amount in the market each month.
              - listitem [ref=e93]: STICK TO THE PLAN!
            - heading "About Me" [level=2] [ref=e94]
            - paragraph [ref=e95]: After getting my Masters degree from Georgia Tech in 1989, I developed the first virtual trading platform specifically for college students. That platform allowed beginner investors (ie, college students taking their first Investments class) to have a virtual portfolio of $100,000 in cash that allowed them to pretend to buy stocks, bonds, and mutual funds.
            - paragraph [ref=e96]: Since then, I have spoken to thousands of teachers, professors, and students about how to invest for beginners. Creating several websites to help high school students, college students, and the general public learn how to be an investor.
            - paragraph [ref=e97]: I have read many “stock market for beginner” books, reviewed countless stock market newsletters and stock picking software programs, and I’ve had dozens of different brokerage accounts as I constantly, almost obsessively, try to find the best products, services, and advice for beginner investors.
            - heading "Here is Proof The American People Need Help Beginning to Invest" [level=2] [ref=e98]
            - paragraph [ref=e99]:
              - text: As the stock market continues to reach new highs here in early 2021, I was greatly disappointed to read the latest
              - link "Federal Reserve’s Survey of Consumer Finances" [ref=e100] [cursor=pointer]:
                - /url: https://www.federalreserve.gov/publications/2020-bulletin-changes-in-us-family-finances-from-2016-to-2019.htm
              - text: that discussed family income, net worth, credit use, and other personal finance issues.
            - paragraph [ref=e101]: "The bottom line was this: In spite of the economy growing at 2.5% from 2016 to 2019, unemployment falling from 5.0% to 3.8%, and median family income rising 5%, Americans continue to make very bad mistakes about their personal finances, their savings and investing, and their retirement planning."
            - paragraph [ref=e102]: This is very disturbing for those of us in the financial education sector.
            - paragraph [ref=e103]:
              - strong [ref=e104]: Come on people!
              - text: It’s easier than you think to
              - strong [ref=e105]: take charge of your finances and start building your net worth!
            - paragraph [ref=e106]
            - heading [level=3]
            - heading "Why You Need to Begin Investing Sooner than Later" [level=3] [ref=e107]
            - paragraph [ref=e108]: "I’m going to give you 10 easy steps, but before I do, here are some more data points from what the Federal Reserve Survey found:"
            - list [ref=e109]:
              - listitem [ref=e110]: Less than 40% of families in the bottom half of the income distribution were in a retirement plan
              - listitem [ref=e111]: The average consumer credit card interest rate INCREASED from 12.3% to 15.1%
              - listitem [ref=e112]:
                - text: "The Median Income based on education level continues to prove the value of education:"
                - list [ref=e113]:
                  - listitem [ref=e114]: No high school diploma, median income was $31k
                  - listitem [ref=e115]: High school diploma, median income was $46k
                  - listitem [ref=e116]: Some college, median income was $51k
                  - listitem [ref=e117]: College degree, median income was $96k
              - listitem [ref=e118]:
                - text: The Median Net Worth by age continues to show lack of savings and investing plans
                - list [ref=e119]:
                  - listitem [ref=e120]: Less than 35 years old, average net worth was $14k
                  - listitem [ref=e121]: 35-44 years old, average net worth was $91k
                  - listitem [ref=e122]: 45-54 years old, average net worth was $169k
                  - listitem [ref=e123]: 55-64 years old, average net worth was $213k
                  - listitem [ref=e124]: 65-74 years old, average net worth was $266k
                  - listitem [ref=e125]: and 75+years old it was $255k
              - listitem [ref=e126]: Only 59% of families reported that they saved money in 2019.
              - listitem [ref=e127]: Only 53% of families report owning stocks either directly or in retirement accounts.
            - paragraph [ref=e128]
            - heading [level=3]
            - heading "Ask Yourself These Questions:" [level=3] [ref=e129]
            - list [ref=e130]:
              - listitem [ref=e131]: Are YOUR finances on track?
              - listitem [ref=e132]: Are YOU above average?
              - listitem [ref=e133]: Are YOU saving money each year?
              - listitem [ref=e134]: Is YOUR net worth growing each year?
            - paragraph [ref=e135]: It’s nice to have a benchmark to know if you’re on track or “average.” But when it comes to saving and investing, it’s always better to be above average.
            - paragraph [ref=e136]: "Another stat from that Federal Reserve Survey you must know is this: Of those families that are in the top 10% of wage earners, over 93% invest in the stock market; and those families have a average net worth of over $1.5 million."
            - paragraph [ref=e137]:
              - text: So what do the top 10% of earners know that the rest of us don’t? T
              - strong [ref=e138]: he stock market is a great place to invest
              - text: your savings.
            - paragraph [ref=e139]:
              - text: And this is what I have spent the last 30 years of my life trying to teach people. The average return of the stock market is 8-12% a year, which is far better than bonds, gold, and real estate. See this article at
              - link "Seeking Alpha" [ref=e140] [cursor=pointer]:
                - /url: https://seekingalpha.com/article/4297590-rolling-returns-gold-vs-stocks-and-bonds
              - text: ", the source for the following chart, that shows the average return of 10.70% for the last 45 years."
            - paragraph [ref=e141]:
              - img "stocks vs gold vs bonds" [ref=e142]
            - paragraph [ref=e143]:
              - text: The other thing they know is that the
              - strong [ref=e144]: sooner you start investing, the faster your money will grow
              - text: "!"
            - paragraph [ref=e145]: The conclusion I reach time and time again is that systematic saving and investing in the stock market is the best way to build wealth. Over the last 100 years, investing in the stock market beats all of the usual investments of real estate, bonds, gold, CDs, etc.
            - heading "10 Beginner Investing Steps to Success" [level=2] [ref=e146]
            - paragraph [ref=e147]: "So if you are a beginner investor, here are the steps you need to take to start investing in the stock market (the right way) and build your net worth:"
            - list [ref=e148]:
              - listitem [ref=e149]:
                - strong [ref=e150]: Start saving money each paycheck.
                - list [ref=e151]:
                  - listitem [ref=e152]: Aim for 10% but be happy if you can save 5%.
                  - listitem [ref=e153]: If all of your paycheck gets direct deposited into you checking account, then open a savings account and have 5-10% deposited there so you’re forced to live on your checking account funds.
              - listitem [ref=e154]:
                - strong [ref=e155]: If your employer offers a retirement plan, then TAKE it!
              - listitem [ref=e156]:
                - strong [ref=e157]: Always know your credit score
                - text: and check your credit report frequently.
                - list [ref=e158]:
                  - listitem [ref=e159]: Incorrect items on your credit report can cost you money from the interest rate banks and credit card companies charge you.
              - listitem [ref=e160]:
                - strong [ref=e161]: Pay off high interest loans and credit cards.
              - listitem [ref=e162]:
                - strong [ref=e163]: Practice trading in the stock market.
                - list [ref=e164]:
                  - listitem [ref=e165]: While you’re starting to save cash, register for a free $100,000 VIRTUAL practice stock market account
                  - listitem [ref=e166]: Get experience and devise profitable strategies before you start using REAL money
              - listitem [ref=e167]:
                - strong [ref=e168]: Sign up for FREE, informative financial newsletters.
                - list [ref=e169]:
                  - listitem [ref=e170]:
                    - text: Here’s a link to our favorite
                    - emphasis [ref=e171]:
                      - link "free beginner stock newsletter" [ref=e172] [cursor=pointer]:
                        - /url: https://www.morningbrew.com/?utm_source=stocktrak&utm_medium=wssemail&utm_campaign=dr3
                  - listitem [ref=e173]: Learn how the stock markets work and stay informed on business and economic news by using “filters” like these to zero in on useful information
              - listitem [ref=e174]:
                - strong [ref=e175]: Sign up for free stock market courses.
                - list [ref=e176]:
                  - listitem [ref=e177]:
                    - text: "This one was just ranked one of the top free stock market courses by CNBC: a"
                    - strong [ref=e178]:
                      - link "free online beginner stock market course" [ref=e179] [cursor=pointer]:
                        - /url: https://investing101.net/?utm_source=wss&utm_media=blog&utm_campaign=beginvpost
                    - text: like Investing101.net
                  - listitem [ref=e180]:
                    - text: See if
                    - link "Coursera is worth it" [ref=e181] [cursor=pointer]:
                      - /url: https://www.wallstreetsurvivor.com/cousera-review-is-it-legit-pros-cons-and-everything-you-need-to-know/
                      - strong [ref=e182]: Coursera
                      - text: is worth it
                    - text: and can help you advance your investing and business knowledge through their paid and free courses as well.
              - listitem [ref=e183]:
                - strong [ref=e184]: Open a stock brokerage account that doesn’t charge commission and get ready to invest
                - text: .
                - list [ref=e185]:
                  - listitem [ref=e186]: Once you’ve saved 3 months of your income in your savings account, it’s time to open a brokerage account.
                  - listitem [ref=e187]:
                    - text: For beginner investors, we recommend Robinhood because it is easy to use, it’s free, and they don’t charge commission. Also, see how you can get
                    - link "free stock from Robinhood" [ref=e188] [cursor=pointer]:
                      - /url: https://www.wallstreetsurvivor.com/robinhood-free-stock/?utm_source=wss&utm_medium=blog&utm_campaign=beg-inv-10
                    - text: worth up to $250 when you open an account.
                  - listitem [ref=e189]:
                    - text: It’s used by over 10,000,000 investors and they give you a
                    - link "free stock (up to $250)" [ref=e190] [cursor=pointer]:
                      - /url: https://www.wallstreetsurvivor.com/robinhood-free-stock/?utm_source=wss&utm_medium=blog&utm_campaign=beg-inv-10
                    - text: when you open an account, and then again when you refer friends.
              - listitem [ref=e191]:
                - strong [ref=e192]: Pick the best stocks and beat the market!
                - list [ref=e193]:
                  - listitem [ref=e194]:
                    - text: "You can do it if you get the right stocks. Here are our recommendations:"
                    - list [ref=e195]:
                      - listitem [ref=e196]:
                        - emphasis [ref=e197]:
                          - text: Read this
                          - link "Motley Fool Review" [ref=e198] [cursor=pointer]:
                            - /url: https://www.wallstreetsurvivor.com/motley-fool-review/
                          - text: . Their stock picks have consistently beat the market, which is always ayou goal.
                      - listitem [ref=e199]:
                        - emphasis [ref=e200]:
                          - text: Read this
                          - link "Best Stock Newsletters" [ref=e201] [cursor=pointer]:
                            - /url: https://www.wallstreetsurvivor.com/best-investment-newsletters/
                          - text: of the top 10 stock newsletters and find the one that is right for you.
              - listitem [ref=e202]:
                - strong [ref=e203]: Stick to this plan!
                - list [ref=e204]:
                  - listitem [ref=e205]: Keep learning and keep investing each month
                  - listitem [ref=e206]: As your income grows each year, increase your monthly investing amount proportionately
