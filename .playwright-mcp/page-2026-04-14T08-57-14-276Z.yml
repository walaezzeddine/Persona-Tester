              - paragraph [ref=e113]: "Now let’s look at the places where millions of these transactions take place each and every day: stock exchanges."
              - heading "Stock Exchanges for Beginners" [level=2] [ref=e114]
              - generic [ref=e115]:
                - paragraph [ref=e116]: Stock exchanges facilitate stock trading among investors – they give investors the ability to buy and sell their shares. That’s why stock prices are constantly changing. If more people are selling (and therefore trying to get rid of) a stock than those buying it, the stock price will drop. If more people want to buy a stock than people selling it, the stock price will rise. Stock exchanges bring all these investors together, so that trades happen in a central and regulated place.
                - paragraph [ref=e117]:
                  - text: There are hundreds of stock exchanges all over the world. In the U.S., the top stock exchanges are the
                  - link "New York Stock Exchange (NYSE)" [ref=e118] [cursor=pointer]:
                    - /url: https://nyse.nyx.com/
                  - text: ","
                  - link "the NASDAQ" [ref=e119] [cursor=pointer]:
                    - /url: http://www.nasdaq.com/
                  - text: ", and"
                  - link "the American Stock Exchange (AMEX)" [ref=e120] [cursor=pointer]:
                    - /url: https://usequities.nyx.com/markets/nyse-mkt-equities
                  - text: . Each of these exchanges have different companies trading on them. For example, NASDAQ is known for technology companies. Most of the tech stocks, especially in the US, trade on the NASDAQ stock exchange.
                - paragraph [ref=e121]: A lot of today’s trading takes place online, rather than on trading floors on Wall Street. But that doesn’t mean stock exchanges lose any importance. Even though it all takes place online, each and every trade placed has to go through a stock exchange in order to match buyers and sellers together. This is called the Electronic Communication Network (ECN), which connects traders and brokers over the Internet instead of on the trading floor.
                - paragraph [ref=e122]: Next we’ll go through the different type of investors that are trading on these stock exchanges…
                - heading "Investors" [level=2] [ref=e123]
                - generic [ref=e124]:
                  - paragraph [ref=e125]:
                    - img "stock market for beginners" [ref=e127]
                  - paragraph [ref=e128]: "There are two types of investors out there: Institutional and Retail."
                  - paragraph [ref=e129]: Institutional investors are large firms like banks, investment companies, mutual funds or hedge funds that invest pools of money on behalf of their investors. They make up the majority of the volume (number of shares traded) on the stock market. Because some of these firms are so large, their trades have a significant impact on the share price of a company. Institutional investors are sometimes referred to as “smart money” (but usually only by other institutional investors).
                  - paragraph [ref=e130]:
                    - text: A
