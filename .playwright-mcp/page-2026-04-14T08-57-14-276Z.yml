            - heading "So you want to learn about the stock market… but where do you start?" [level=2] [ref=e61]
            - paragraph [ref=e62]:
              - emphasis [ref=e63]: For stock market beginners, the financial industry can be really complicated
              - text: . Investors, brokers, traders, lenders, borrowers, advisors, companies, banks, stocks, shares, funds, prices…is your head spinning yet?
            - paragraph [ref=e64]: Thankfully, you came to the right place. For stock market beginners, it’s important to start broad and then narrow in on details.
            - paragraph [ref=e65]: So first, we’ll review the history of the financial industry and how it’s structured. Then, we’ll take a look at the stock market and dig deep into how it functions. We’ll talk major U.S. stock exchanges, and their participants, to bring it all back out into the real world.
            - paragraph [ref=e66]:
              - text: Make sure to stick around, because at the end of the article we’re going to tell you the
              - strong [ref=e67]: best stock brokers
              - text: for stock market beginners, and we’ll also clue you in on how stock market beginners can get the
              - strong [ref=e68]: best stock picks
              - text: .
            - paragraph [ref=e69]: So strap in, because we’re about to skydive into the world that all the big wigs on Wall Street – with their fancy tie clips and pinstripes – don’t want you to understand.
            - heading "The Financial Industry for Stock Market Beginners" [level=2] [ref=e70]
            - paragraph [ref=e71]: From bartering to gold to paper bills and credit, money has always been around, albeit in many different forms.
            - paragraph [ref=e72]: Money was created out of a need to trade goods and services between one another. People always have needs. They need food to eat, clothes to wear, and shiny sports cars to…look cool. OK, some of our “needs” are more like “wants”. But either way, people look for ways to satisfy their demands.
            - paragraph [ref=e73]:
              - text: Way back when, people traded goods in order to get what they needed, by giving up what they had. Let’s say, I trade you a goat for a gallon of milk. But not all products and services are tradable. For instance, you wouldn’t trade wheat for electricity. So, we turn to
              - strong [ref=e74]: money
              - text: .
            - paragraph [ref=e75]:
              - text: Money is the middleman. Money takes care of the
              - generic [ref=e76]: transaction
              - text: between buyers and sellers.
            - paragraph [ref=e77]:
              - strong [ref=e78]: But as our world has developed and grown more complex, so has the meaning and purpose of money.
              - text: We’re no longer dealing with shepherds bartering sheep. Today we have multinational corporations that handle millions and billions of dollars. In order to handle this evolution, we needed a way to organize it.
            - paragraph [ref=e79]: Enter the financial industry.
            - paragraph [ref=e80]: "In a nutshell, the financial industry is all about managing money: investing it, growing it, saving it and ultimately spending it."
            - paragraph [ref=e81]: The stock market is at the center of all this, where people (investors) and businesses meet to make transactions and respectively manage their money.
            - generic [ref=e82]:
              - paragraph [ref=e83]:
                - text: Well, in 1602, a man named Johan van Oldenbarnevelt decided to start a company that would eventually grow to almost the same size as his last name. This early megacorporation was called the
                - link "Dutch East India Company" [ref=e84] [cursor=pointer]:
                  - /url: http://people.hofstra.edu/geotrans/eng/ch2en/conc2en/map_VOC_Trade_Network.html
                - text: . Think Walmart’s great, great, great, great grandparent. Johan’s idea, one of the reasons the company became so successful, was to offer shares to investors in exchange for a portion of the company’s profits.
              - paragraph [ref=e85]:
                - text: Johan, the first stock market beginner, created history. Now companies could raise money without
                - strong [ref=e86]: debt
                - text: . Instead, through the stock market, they issue shares of their company to the public in what is known as an
                - link "Initial Public Offering (IPO)" [ref=e87] [cursor=pointer]:
                  - /url: http://www.youtube.com/watch?v=SiAuBVrwqbw
                - text: . Investors buy and sell these shares (or stocks) to one another on the stock exchange, thus making stock prices move up and down. If there are more people buying a stock than people selling it, the price goes up with the demand. If more people are selling than there are people buying a stock, that’s a sign that the company is unfavorable to own and the stock price drops.
              - heading "The stock market is mutually beneficial to businesses and investors because:" [level=3] [ref=e88]
              - list [ref=e90]:
                - listitem [ref=e91]: Companies raise money to (try to) make their businesses grow
                - listitem [ref=e92]: Investors invest in businesses to (try to) make their money grow
              - heading "Starbucks and the Stock Market" [level=2] [ref=e93]
              - paragraph [ref=e94]:
                - text: Pumpkin spice latte jokes aside – we all secretly love Starbucks. But let’s say for a second that you’re
                - emphasis [ref=e95]: obsessed
                - text: .
              - paragraph [ref=e96]: In order to buy your daily cup of coffee, you need money. You make a pretty nice income from your job as a Coffee Critic, but you’d like to have some extra disposable income so that you can afford your daily cup of Joe (You’d think as a coffee critic, they’d supply you with free coffee. But such is life…) You decide to grow your money by investing it, in the stock market.
              - paragraph [ref=e97]: Starbucks understands that you (and millions of other people all around the world) have a demand for a daily cup of coffee. In order to satisfy that increasing demand, Starbucks needs to grow; and they need money to do that. The company needs to buy more beans, hire more employees, open new stores, etc. So, in order to raise this money, they issue stock to investors on the stock market.
              - paragraph [ref=e98]: This means that they cut up the company into millions of (figurative) pieces. They sell these little pieces of the company, known as stocks, to people like you and me. If you own a stock, you own a little piece of the company.
              - paragraph [ref=e99]: Since you love Starbucks so much, you believe that they’ll successfully grow and satisfy more peoples’ pumpkin spice addictions. You think they’ll buy fresh beans, hire skilled employees, and open trendy new stores. So you decide to buy Starbucks’ stock. This means that you own a little piece of the company. If Starbucks grows and makes more money, your money grows along with it.
