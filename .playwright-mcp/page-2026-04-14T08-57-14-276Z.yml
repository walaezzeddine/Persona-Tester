                    - paragraph [ref=e142]: While you can buy ALMOST everything on Amazon.com, you can’t buy shares of your favorite companies. At least not yet, right Bezos? To get started investing in the stock market, you will need to open a stock brokerage account. But relax–it is a lot easier than you think and takes only a few minutes. You will need your social security number so the brokerage can report all of your profits to the IRS, and it helps speed things up if you have your bank account info ready so that you can fund your brokerage account. As long as you are opening a brokerage account with a reputable firm, like the ones below, you have nothing to worry about.
                    - paragraph [ref=e143]: Buying a stock is a little buying a car or a house. It helps to go a car dealer or a real estate agent so that you can see all the choices that are out there. Most people don’t use Amazon to buy a house. They hire a real estate agent who knows the housing market and works with other real estate agents to find houses for sale.
                    - paragraph [ref=e144]: Stock brokers are like the real estate agents of the stock market. Brokers buy and sell stocks on behalf of investors on the stock exchange.
                    - paragraph [ref=e145]: There are a number of types of brokers. Full service brokers will not only perform the trades for you but will also manage your portfolio for you and give you trading advice. Other brokers, such as discount brokers, won’t give you any advice at all. With a discount broker, you can make your own trades and not have to pay any commissions.
                    - paragraph [ref=e146]: The two most important thing to look at when choosing a stock broker is the services that they offer and the structure of their fees. Brokers charge investors in various ways, depending on the type of services you’re looking for.
                    - heading "List of Brokerages" [level=2] [ref=e147]
