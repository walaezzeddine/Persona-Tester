                    - text: "is…well…you. It refers to someone who puts money in the market for themselves: an individual investor. Since the financial crash in 2008-2009, there has been an emergence of “retail investors”. People have stopped trusting big investment banks and funds with their money, and choose to learn how to become financially independent and in control of their own money (kind of like what you’re doing right now!)"
