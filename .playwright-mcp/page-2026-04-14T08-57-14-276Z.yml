                      - paragraph [ref=e149]: "Many brokerages offer their services online, so you can trade directly from your computer without any hassle. Here are a few online brokerages stock market beginners can use to get started:"
                      - heading "Robinhood" [level=3] [ref=e150]
                      - paragraph [ref=e151]:
                        - text: Robinhood is the newest stock broker and the fastest growing. They were started in 2013 and already have over 10,000,000 users. They grew this fast by becoming the first brokerage to charge $0 commission. They also don’t spend any money on advertising as they have a great referral program. When you open a Robinhood account, they give you a stock worth somewhere between $5 and $250. Then if you refer a friend, they give you and your friend another stock! They are a bare bones broker, you can only trade via their mobile app, and you can only trade U.S. stocks and ETFs. The minimum to open an account is just $10, so it is absolutely the best place to start (as long as you have a mobile phone). The company provides
                        - strong [ref=e152]:
                          - link "fee-free trading" [ref=e153] [cursor=pointer]:
                            - /url: /go/robinhoodnc
                          - text: .
                        - text: If you are an experienced trader…you know fees can add up fast. Robinhood eliminates this cost. The service proves to be one-of-a-kind by cutting out nearly all costs associated with investing. For this reason, we think Robinhood is the
                        - strong [ref=e154]: best broker for stock market beginners.
                      - heading "So How Do I Open a Robinhood Account and Get up to $1,000 in FREE STOCK?" [level=2] [ref=e155]
                      - paragraph [ref=e156]: To open a Robinhood account, all you need is your name, address, and email. If you want to fund your account immediately, you will also need your bank account routing and account number.
                      - paragraph [ref=e157]:
                        - text: As its current promotion, Robinhood is giving away a FREE STOCK (valued at $5 to $200) to anyone that opens a new account this month if you click on the promo image below. Then, once you open and fund YOUR account with at least $10, you will receive more free stock (again valued at $5 to $200) for referring your friends and family. The more people you refer, the more free stock you get.
                        - strong [ref=e158]: Click on this promo below to start your Robinhood account application and get your first FREE stock.....
                      - paragraph [ref=e159]:
                        - link "Is Robinhood Safe? Get Free Stock" [ref=e160] [cursor=pointer]:
                          - /url: /go/robinhoodnc
                          - img "Is Robinhood Safe? Get Free Stock" [ref=e161]
                      - paragraph [ref=e162]:
                        - strong [ref=e163]: "Bonus Tip: Use this link to get a free stock (up to $200 value) when you open and fund your account with at least $10:"
                        - link "sign up for Robinhood today" [ref=e164] [cursor=pointer]:
                          - /url: /go/robinhoodnc
                        - text: ", you'll get a free stock (up to $200 value!) FURTHERMORE, for each friend that you refer, you will receive ANOTHER free stock valued at up to $200. This is perfectly legit and you WILL get more free stock for every friend or family member you refer."
                      - paragraph [ref=e165]:
                        - strong [ref=e166]: Why do they give away so much free stock?
                        - text: Because they spend their advertising dollars this way instead of buying TV, radio, print, or online ads! They WANT you to refer friends!
                      - generic [ref=e167]:
                        - heading "Charles Schwab" [level=3] [ref=e168]
                        - paragraph [ref=e169]:
                          - link "Charles Schwab logo" [ref=e170] [cursor=pointer]:
                            - /url: http://pubads.g.doubleclick.net/gampad/clk?id=5437449293&iu=/5206/invc.wss
                            - img "Charles Schwab logo" [ref=e171]
                          - text: Charles Schwab is the second most popular brokerage these days and they have come a long way since they were founded in 1973. Interestingly, they were one of the first discount brokers, but then transitioned to a full service broker, and now back to a discount brokerage with commission free trades (like most brokerages, they were forced to match Robinhood’s $0 fee structure). While Robinhood is a great brokerage for beginners to start, Scwhab is the next progression once you want to trade mutual funds, options, get quality research and trading tools, and seek professional advice and planning. It is our recommended broker if you have more than $10,000 you want to invest and you are ready to get serious about planning out your financial future. Click the link below to get started with Schwab.
                        - paragraph [ref=e172]: $0 online stock, ETF, and options commissions.
