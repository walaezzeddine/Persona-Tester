            - paragraph [ref=e610]: I will try not to bore you, but I think it’s important to tell you a bit about myself and why I felt the need to write this Motley Fool Stock Advisor review.
            - paragraph
            - paragraph
            - paragraph [ref=e611]: My story is probably not too different from yours. I watched my parents work their a** off (excuse my French). They each worked 50+ hours a week to give our family the best lifestyle they could. Unfortunately, my father passed away six years ago just after his 65th birthday. He worked hard his whole life and planned to enjoy his retirement, but he died within months of retiring. My dad’s death taught me a valuable lesson–I need to start building my personal wealth NOW so I can retire early and ENJOY my retirement.
