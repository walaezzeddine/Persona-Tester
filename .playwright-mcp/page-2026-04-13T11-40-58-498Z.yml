                  - listitem [ref=e644]: The performance of its picks. Yup, this one was the subject of both praise and disappointment. Some people feel the service recommends overpriced stocks, while others say that the picks have lost money. One mitigating factor here is that some of the reviewers haven’t owned these stocks long enough or don’t understand the buy-and-hold strategy.
