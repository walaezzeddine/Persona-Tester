            - blockquote [ref=e73]:
              - paragraph [ref=e74]:
                - strong [ref=e75]: "December 31, 2025:"
                - text: The S&P500 wrapped up the 2025 calendar year with a 16.4% gain, slightly off its high for the year. The Dow finished up 13.0 % and was slightly off its high too. The NASDAQ was up 20.4%. Those numbers are calculated from December 31, 2024 values to December 31, 2025 values. The Motley Fool
                - emphasis [ref=e76]: Stock Advisor
                - text: picks came out evenly throughout the year so you would expect their 2025 picks to average about 1/2 of those numbers and that is what happened! The
                - emphasis [ref=e77]: Stock Advisor
                - text: ‘s 2025 picks were up an average of 8.5%. Their 2024 picks improved up 16% and their 2023 picks improved by 19.1%
                - strong [ref=e78]: which are better than the market’s returns
                - text: .
              - paragraph [ref=e79]:
                - text: The Motley Fool’s
                - emphasis [ref=e80]: Stock Advisor
                - text: currently has an average return since inception in 2002 of
                - strong [ref=e81]: 975% vs. the S&P500’s 194%.
                - text: That means that over the last 23 years,
                - strong [ref=e82]:
                  - text: their 500+ stock picks have
                  - emphasis [ref=e83]: averaged almost
                  - text: a 10-fold return
                - text: and are
                - strong [ref=e84]: beating the market by an average of 781%
                - text: . How is that possible? Read on to see my analysis of all their picks and my experience buying their stock picks.
            - paragraph [ref=e85]:
              - text: This Motley Fool Stock Advisor Review is based on my personal experience of
              - strong [ref=e86]: being a subscriber
              - text: to the Motley Fool
              - emphasis [ref=e87]: Stock Advisor
              - text: and to their
              - emphasis [ref=e88]: Epic Service
              - text: AND
              - strong [ref=e89]: buying about $1,500 of each of their stock picks
              - text: since 2016 in my ETrade account. Yes, that’s 200+ trades over the last 10 years. And I have sold the 30% that they recommended selling.
            - paragraph [ref=e90]:
              - text: I also subscribe to a dozen other stock newsletters (Zacks, Seeking Alpha, IBD, Benzinga, Cramer, Morningstar, Moby,
              - link "CNBC" [ref=e91] [cursor=pointer]:
                - /url: http://www.cnbc.com
              - text: ", etc.) so I can constantly compare all of their performances, as you will see below."
            - paragraph [ref=e92]:
              - strong [ref=e93]: "Hint:"
              - text: The Motley Fool Stock Advisor service has the best returns of all of the stock newsletters I have ever tested over the last 23 years. Their investing philosophy is that you should buy at least 25 of their stock picks and hold them for at least a few years. Therefore, it is not a service for day traders; it is not a service for those wanting to get rich quick. It is for the intelligent investor who wants to get rich over time by buying solid stock with high growth potential like NVDA, NFLX, AMZN, and SHOP early and holding for a few years.
            - paragraph [ref=e94]: "The best advice we can give you is simple:"
            - paragraph [ref=e95]: The most reliable way over the last 100 years to build your personal wealth is to invest regularly in the stock market. And the time to start investing is always NOW. So if you are just getting started in the stock market, or are an experienced investor looking for some solid stock picks, history shows that the Motley Fool would have helped you build a solid stock portfolio that easily crushes the market over the years.
            - paragraph [ref=e96]: A quick comment about all the Motley Fool naysayers out there. The Fool recommends stock that you should plan on holding for 5 years or more. They say that up front. Every pick does not go up. But over time they do pick many stocks that double or triple or 10x as you will see below. Those winners more than offset the losers. Their returns speak for themselves.
            - paragraph [ref=e97]: I try to update this Motley Fool review every month so you can see how the Motley Fool stock picks have performed since 2016 when I started buying them, and since inception–so please bookmark this page and keep coming back.
            - paragraph [ref=e98]: "Here’s a quick summary of my performance with the Motley Fool Stock Advisor service since I subscribed in January 2016:"
            - list [ref=e99]:
              - listitem [ref=e100]: Every year of stock picks for the last 9 years were profitable and are beating the market on average by 33%.
              - listitem [ref=e101]: Yes, read that again, over the last 240 stock picks their AVERAGE return is beating the market by 33%.
              - listitem [ref=e102]: Over the last 10 years their average pick is up 144% and the market on average over that time is up 111%.
              - listitem [ref=e103]: 67 of those 240 picks have doubled or more
              - listitem [ref=e104]: Their best pick for me over the last 10 years is up 7,338%. Yes NVDA was their pick in 2017.
            - paragraph [ref=e105]:
              - text: But most importantly note that
              - strong [ref=e106]: their 120 picks that are at least 5 years old since I subscribed in 2016 are beating the market by 92%
              - text: . So their picks are doing exactly what they say–plan on holding their stock picks for at least 5 years and you should have an excellent portfolio. Of those stocks that are at least 5 years old they have recommending selling 36 of them so they do dump non- performing stocks frequently.
            - heading "Overall Performance of The Motley Fool Stock Picks" [level=2] [ref=e107]
            - paragraph [ref=e108]:
              - text: First, you need to know that these ads that you see for the Motley Fool returns are definitely true. The average of all 576 of their stock picks since 2002 is
              - strong [ref=e109]: 975%
              - text: as of January 2, 2026 compared to the market’s 194%. That means if you had invested just $100 in each of their 576 picks for 23 years, your $57,600 would now have $561,600 of profit. If you had invested that same amount in the S&P 500 evenly over the years you would have only $111,000 of profit.
            - paragraph [ref=e110]:
              - text: Likewise, if you had invested $1,000 in each of their picks since 2002 your $576,000 would now be worth over $6,200,000! That is an amazing difference and
              - strong [ref=e111]: that
              - text: is the reason over 500,000 investors are subscribers to the Motley Fool. With that many subscribers, you really need to buy their picks as soon as they are released as their picks frequently pop in price the day they come out.
            - paragraph [ref=e112]: Look at this recent image from their site. Their stock picks took a hit during Covid but have since fully recovered and zoomed higher. This chart is quite remarkable as no other stock service comes close to these consistent returns over such a long period of time..
