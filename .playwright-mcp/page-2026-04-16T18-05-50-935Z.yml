              - heading "Chapter 1 - Introduction To Investing" [level=3] [ref=e49]
              - text: Whether you have $1,000 or $1,000,000 in savings, education is the key to empowering yourself to take charge of your financial future.
              - link "Read More" [ref=e50] [cursor=pointer]:
                - /url: http://app.wallstreetsurvivor.com/content/index?url=wss-htmw-chapter-1-introduction-to-investing
          - row "1-01 Understanding Investment Choices When learning any new skill, like playing golf or investing, you must begin understanding some of the \"tools\" and \"terms\" involved. Without this basic knowledge, it is difficult – if not impossible – to practice your new skill properly. Read More" [ref=e51]:
            - cell [ref=e52]:
              - img [ref=e53]
            - cell "1-01 Understanding Investment Choices When learning any new skill, like playing golf or investing, you must begin understanding some of the \"tools\" and \"terms\" involved. Without this basic knowledge, it is difficult – if not impossible – to practice your new skill properly. Read More" [ref=e54]:
              - heading "1-01 Understanding Investment Choices" [level=3] [ref=e55]
              - text: When learning any new skill, like playing golf or investing, you must begin understanding some of the "tools" and "terms" involved. Without this basic knowledge, it is difficult – if not impossible – to practice your new skill properly.
              - link "Read More" [ref=e56] [cursor=pointer]:
                - /url: http://app.wallstreetsurvivor.com/content/index?url=wss-htmw-01-01
          - row "1-02 Bank and Credit Union Products Most financial institutions, banks, credit unions, and savings and loan associations have a similar menu of investment products from which you may choose. Here are the most common and popular products Read More" [ref=e57]:
            - cell [ref=e58]:
              - img [ref=e59]
            - cell "1-02 Bank and Credit Union Products Most financial institutions, banks, credit unions, and savings and loan associations have a similar menu of investment products from which you may choose. Here are the most common and popular products Read More" [ref=e60]:
              - heading "1-02 Bank and Credit Union Products" [level=3] [ref=e61]
              - text: Most financial institutions, banks, credit unions, and savings and loan associations have a similar menu of investment products from which you may choose. Here are the most common and popular products
              - link "Read More" [ref=e62] [cursor=pointer]:
                - /url: http://app.wallstreetsurvivor.com/content/index?url=wss-htmw-01-02
          - row "1-03 Certificates of Deposit (CDs) When you buy a CD you are locked into that interest rate for the life of the CD. If you take out your money before the full term, the bank will charge you a penalty so make sure you understand the term and the penalties involved if you suddenly need the cash and you have to “bust” your CD. Also, consider which direction you think interest rates are heading. If interest rates are very low, don’t lock in a low rate for 5 years! You can’t just bust your CD and then buy a new one with a higher interest rate if you’re current CD hasn’t matured yet. Read More" [ref=e63]:
            - cell [ref=e64]:
              - img [ref=e65]
            - cell "1-03 Certificates of Deposit (CDs) When you buy a CD you are locked into that interest rate for the life of the CD. If you take out your money before the full term, the bank will charge you a penalty so make sure you understand the term and the penalties involved if you suddenly need the cash and you have to “bust” your CD. Also, consider which direction you think interest rates are heading. If interest rates are very low, don’t lock in a low rate for 5 years! You can’t just bust your CD and then buy a new one with a higher interest rate if you’re current CD hasn’t matured yet. Read More" [ref=e66]:
              - heading "1-03 Certificates of Deposit (CDs)" [level=3] [ref=e67]
              - text: When you buy a CD you are locked into that interest rate for the life of the CD. If you take out your money before the full term, the bank will charge you a penalty so make sure you understand the term and the penalties involved if you suddenly need the cash and you have to “bust” your CD. Also, consider which direction you think interest rates are heading. If interest rates are very low, don’t lock in a low rate for 5 years! You can’t just bust your CD and then buy a new one with a higher interest rate if you’re current CD hasn’t matured yet.
              - link "Read More" [ref=e68] [cursor=pointer]:
                - /url: http://app.wallstreetsurvivor.com/content/index?url=wss-htmw-01-03
          - row "1-04 Stocks Stocks are \"equity investments\" which means that when you own shares of a company you own part of that company. For example, if you own 1,000 shares of Apple Computer stock and Apple has 1,000,000 shares that are \"issued and outstanding,\" then you own 0.1% of the company. If Apple were then to be sold to another company for $50,000,000, then each share would be worth $50 ($50 million divided by 1 million shares). At $50 a share, you would receive $50,000 for your 1,000 shares. Read More" [ref=e69]:
            - cell [ref=e70]:
              - img [ref=e71]
            - cell "1-04 Stocks Stocks are \"equity investments\" which means that when you own shares of a company you own part of that company. For example, if you own 1,000 shares of Apple Computer stock and Apple has 1,000,000 shares that are \"issued and outstanding,\" then you own 0.1% of the company. If Apple were then to be sold to another company for $50,000,000, then each share would be worth $50 ($50 million divided by 1 million shares). At $50 a share, you would receive $50,000 for your 1,000 shares. Read More" [ref=e72]:
              - heading "1-04 Stocks" [level=3] [ref=e73]
              - text: Stocks are "equity investments" which means that when you own shares of a company you own part of that company. For example, if you own 1,000 shares of Apple Computer stock and Apple has 1,000,000 shares that are "issued and outstanding," then you own 0.1% of the company. If Apple were then to be sold to another company for $50,000,000, then each share would be worth $50 ($50 million divided by 1 million shares). At $50 a share, you would receive $50,000 for your 1,000 shares.
              - link "Read More" [ref=e74] [cursor=pointer]:
                - /url: http://app.wallstreetsurvivor.com/content/index?url=wss-htmw-01-04
          - row "1-05 Mutual Funds A mutual fund is a type of investment where a money manager takes your cash and invests it as he sees fit, usually following some rough guidelines. For example, the Fidelity Group has a fund that specializes in finding high dividend paying stocks, one that specializes in bank stocks, and one that specializes in European stocks, etc. You simply find a fund that matches your objective, you review its past performance and its management team, and then you write a check to that mutual fund. Read More" [ref=e75]:
            - cell [ref=e76]:
              - img [ref=e77]
            - cell "1-05 Mutual Funds A mutual fund is a type of investment where a money manager takes your cash and invests it as he sees fit, usually following some rough guidelines. For example, the Fidelity Group has a fund that specializes in finding high dividend paying stocks, one that specializes in bank stocks, and one that specializes in European stocks, etc. You simply find a fund that matches your objective, you review its past performance and its management team, and then you write a check to that mutual fund. Read More" [ref=e78]:
              - heading "1-05 Mutual Funds" [level=3] [ref=e79]
              - text: A mutual fund is a type of investment where a money manager takes your cash and invests it as he sees fit, usually following some rough guidelines. For example, the Fidelity Group has a fund that specializes in finding high dividend paying stocks, one that specializes in bank stocks, and one that specializes in European stocks, etc. You simply find a fund that matches your objective, you review its past performance and its management team, and then you write a check to that mutual fund.
              - link "Read More" [ref=e80] [cursor=pointer]:
                - /url: http://app.wallstreetsurvivor.com/content/index?url=wss-htmw-01-05
          - row "1-06 ETFs (Exchange-Traded Funds) ETFs have the benefits of Mutual Funds in that one investment allows ownership in a group of Stocks, and usually that ownership is targeted to a specific industry, region or market segment (like gold stocks, financial stocks, small-cap stocks, or the Brazilian market). This built- in diversification is advantageous if you don’t like picking individual stocks but you have an interest in a particular industry. Read More" [ref=e81]:
            - cell [ref=e82]:
              - img [ref=e83]
            - cell "1-06 ETFs (Exchange-Traded Funds) ETFs have the benefits of Mutual Funds in that one investment allows ownership in a group of Stocks, and usually that ownership is targeted to a specific industry, region or market segment (like gold stocks, financial stocks, small-cap stocks, or the Brazilian market). This built- in diversification is advantageous if you don’t like picking individual stocks but you have an interest in a particular industry. Read More" [ref=e84]:
              - heading "1-06 ETFs (Exchange-Traded Funds)" [level=3] [ref=e85]
              - text: ETFs have the benefits of Mutual Funds in that one investment allows ownership in a group of Stocks, and usually that ownership is targeted to a specific industry, region or market segment (like gold stocks, financial stocks, small-cap stocks, or the Brazilian market). This built- in diversification is advantageous if you don’t like picking individual stocks but you have an interest in a particular industry.
              - link "Read More" [ref=e86] [cursor=pointer]:
                - /url: http://app.wallstreetsurvivor.com/content/index?url=wss-htmw-01-06
          - row "1-07 Bonds Unlike stocks, which are equity instruments, bonds are debt instruments. When bonds are first issued by the company, the investor/lender typically gives the company $1,000 and the company promises to pay the investor/lender a certain interest rate every year (called the Coupon Rate), AND, repay the $1,000 loan when the bond matures (called the Maturity Date). Read More" [ref=e87]:
            - cell [ref=e88]:
              - img [ref=e89]
            - cell "1-07 Bonds Unlike stocks, which are equity instruments, bonds are debt instruments. When bonds are first issued by the company, the investor/lender typically gives the company $1,000 and the company promises to pay the investor/lender a certain interest rate every year (called the Coupon Rate), AND, repay the $1,000 loan when the bond matures (called the Maturity Date). Read More" [ref=e90]:
              - heading "1-07 Bonds" [level=3] [ref=e91]
              - text: Unlike stocks, which are equity instruments, bonds are debt instruments. When bonds are first issued by the company, the investor/lender typically gives the company $1,000 and the company promises to pay the investor/lender a certain interest rate every year (called the Coupon Rate), AND, repay the $1,000 loan when the bond matures (called the Maturity Date).
