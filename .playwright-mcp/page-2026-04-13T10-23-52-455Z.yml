            - 'heading "Stock Ratings: How to Know What Stocks to Invest in" [level=1] [ref=e52]'
            - generic [ref=e53]:
              - generic [ref=e55]:
                - text: Written by
                - link "Levi Rasmussen" [ref=e56] [cursor=pointer]:
                  - /url: https://www.wallstreetsurvivor.com/author/levir/
              - text: "/Last Updated: November 3, 2025"
            - generic [ref=e57]: Advertising Disclosure
          - generic [ref=e59]:
            - heading "Introduction" [level=2] [ref=e60]
            - paragraph [ref=e61]: Humans are great at recognizing patterns. But sometimes what we expect to happen, and what actually happens are different. So when investors expect a stock to post great earnings, failing to meet those expectations can causes drastic changes in the stock price.
            - paragraph [ref=e62]: No one likes surprises. Well, except for surprise birthday parties. Those are pretty awesome. But outside of that, we tend to set expectations for things before they happen. And businesses are no different.
            - heading "What to Expect When Your Expecting" [level=2] [ref=e63]
            - paragraph [ref=e64]:
              - text: Before you receive your monthly financial updates from
              - emphasis [ref=e65]: Terrific Tacos
              - text: ", you’ll probably have an expectation of roughly what the sales and profits numbers should be. These will be influenced by the trend you’ve seen over the previous months, the weather and any verbal feedback you’ve received from your business partner."
            - paragraph [ref=e66]:
              - text: In the world of listed investments, this process of setting expectations is a bit more formal. In fact,
              - strong [ref=e67]: an entire industry exists to forecast the future prospects for companies
              - text: .
              - strong [ref=e68]: Investors use these forecasts to make decisions on whether to invest, hold on to their investments, or sell them
              - text: .
            - paragraph [ref=e69]: The media also drives expectations by creating hype around companies. Increasingly investors use social media to source and share ideas about companies. With the growth of social media, small time investors now have access to the world’s most competent finance minds.
            - heading "It’s Value That Matters" [level=3] [ref=e70]
            - paragraph [ref=e71]:
              - text: A share price at any point in time, represents t
              - strong [ref=e72]: he equilibrium point where the number of buyers and sellers is equa
              - text: l. At that point,
              - strong [ref=e73]: the market is agreeing on price, but not on value
              - text: . Some participants are expecting higher prices and some are expecting lower prices.
            - paragraph [ref=e74]: Whether a share price rises or falls will depend on changing perception about how profitable a company is likely to be in the future. Analysts and investors need to dig through the financial statements to find clues as to how well a company can be expected to do in the future.
            - paragraph [ref=e75]:
              - text: Expectations are driven by
              - strong [ref=e76]: analyst forecasts
              - text: ","
              - strong [ref=e77]: company guidance
              - text: ", and the"
              - strong [ref=e78]: financial media
              - text: . They are also influenced by investor’s perception of the economy and equities in general. And, the expectation for each company is influenced by the results of other companies.
            - paragraph [ref=e79]: This chapter covers the process that analysts and the companies themselves follow during earnings season.
            - heading "Analysts and Recommendations" [level=2] [ref=e80]
            - generic [ref=e81]:
              - paragraph [ref=e82]: If Terrific Tacos has its eye on domination of the world taco truck market, it will need some serious cash. And if a company needs lots of money invested, it needs to go to the big boys on Wall Street.
              - paragraph [ref=e83]: But, apart from being the street where the New York Stock Exchange is located, what is Wall Street? The term “Wall Street” is used as a collective noun for a group of investment banks and some other companies. There are three types of companies on Wall Street.
              - list [ref=e85]:
                - listitem [ref=e86]: Investment banks carry out mergers and capital raising for large companies
                - listitem [ref=e87]: Brokerages trade for clients and provide research – they are known as the “sell side” because they sell those services to their clients
                - listitem [ref=e88]: Fund managers manage money for individuals and pension funds – they are known as the “buy side” because they buy trading and research services from the sell side
              - paragraph [ref=e89]: Usually, all three types of businesses will be bundled together in a holding company such as JP Morgan, Bank of America or Goldman Sachs. Company, or equity, analysts are employed by both buy side and sell side firms.
              - paragraph [ref=e90]: Sell-side analysts publish research for their clients, although summaries of this research eventually make their way into the media.
              - paragraph [ref=e91]: Buy-side analysts conduct research for the benefit of the firms they work for. This research is used by fund managers and traders within the firms to make investment decisions. It is seldom shared outside the firm, though the marketing department might use it from time to time to show off the skills the firm employs.
              - heading "So what do analysts do?" [level=3] [ref=e92]
              - paragraph [ref=e93]: Well, analysts are usually qualified accountants, and many are chartered financial analysts too. Most specialize in specific sectors and may have specific industry experience. An analyst’s job is to learn everything there is to know about a handful of companies. They know the industry trends, all the factors which affect sales, costs and the market for the good or services those companies sell.
              - paragraph [ref=e94]:
                - text: They will conduct a bottom-up and top-down analysis of each company. Bottom-up analysis looks at the company in isolation, while top-down research involves starting with the economy and drilling down to the sector, the industry, and the company.
                - strong [ref=e95]: Top-down analysis is helpful in working out how much consumers will have available to spend. Bottom-up analysis is useful for determining how a company allocates its resources.
              - paragraph [ref=e96]:
                - img "stock ratings" [ref=e98]
              - paragraph [ref=e99]:
                - strong [ref=e100]: Analysts forecast the most likely path the financial performance of a company will take over the next three to five years
                - text: . They will usually publish one or two comprehensive reports for each company they cover every year. And, every few months they may update their model and adjust their earnings forecasts.
              - paragraph [ref=e101]:
                - text: First they will work out a forecast for a company’s earnings per share, dividends per share and a 12-month share price target. They will also look at the
                - strong [ref=e102]: average PE ratio
                - text: the stock trades at. They will use this PE and their earnings forecast to calculate a 12-month price target.
              - paragraph [ref=e103]: Based on these forecasts they will publish a recommendation for each share. Recommendations are usually either for investors to buy, sell, or hold a share.
              - paragraph [ref=e104]:
                - img "stock ratings" [ref=e105]
              - paragraph [ref=e106]: You may wonder why a share is worth holding if it is not worth buying. Well, the official answer is that if you already own a share you have already incurred certain transaction costs. The more cynical view would be that issuing a hold recommendation is a way of avoiding having to make a call.
              - paragraph [ref=e107]: Analysts also look at the investment prospects for a company relative to its sector and to the market as a whole.
              - paragraph [ref=e108]:
                - text: As a result, there are numerous variations of the above recommendations. These variations include ‘
                - strong [ref=e109]: market outperform
                - text: ’, ‘
                - strong [ref=e110]: sector perform
                - text: ", ‘"
                - strong [ref=e111]: neutral
                - text: ’, and ‘
                - strong [ref=e112]: underperform
                - text: .’
            - heading "The Whisper Number" [level=2] [ref=e113]
            - generic [ref=e114]:
              - paragraph [ref=e115]: We all know that’s it’s not a great idea to put all your eggs in one basket. If you wanted to invest your hard earned cash in a company, you probably wouldn’t go with just one opinion. Analysts have different views and you’d want to hear a second opinion. And a third. In fact, you’d probably want as many opinions as you can find. This is your savings we’re talking about.
              - paragraph [ref=e116]: "Fortunately as an investor, you can get an average view. Financial news services collect forecasts and recommendations from all the prominent analysts in the industry. The averages of all these forecasts are known as:"
              - heading "Consensus estimates" [level=3] [ref=e117]
              - paragraph [ref=e118]: "When you hear something like: “The street is looking for 60 cents from Cisco,” what that means in English is; “The average earnings per share forecast from Wall Street analysts for Cisco is 60 cents.”"
              - paragraph [ref=e119]:
                - text: If the published earnings are better than the consensus estimate, that’s known as an
                - strong [ref=e120]: earnings surprise
                - text: or a
                - strong [ref=e121]: beat
                - text: . On the other hand, if actual earnings are below consensus that’s a
                - strong [ref=e122]: negative earnings surprise
                - text: or
                - strong [ref=e123]: miss
                - text: .
              - paragraph [ref=e124]:
                - text: The example for Cisco above was from the second quarter of 2016. And, yes they beat “the street”, by
                - link "reporting EPS of 63 cents" [ref=e125] [cursor=pointer]:
                  - /url: http://finance.yahoo.com/news/cisco-beats-fourth-quarter-earnings-223614118.html
                - text: . On the other hand, for the same quarter,
                - link "Ford missed Wall Street’s consensus forecast" [ref=e126] [cursor=pointer]:
                  - /url: http://www.businessinsider.com/ford-misses-on-q2-earnings-says-there-are-risks-to-achieving-guidance-2016-7
                - text: ", and the stock was sold heavily."
              - paragraph [ref=e127]: You can probably guess that when a company beats consensus the share price usually rises and when it misses the share price usually falls. But that’s not what always happens. We will look at why that might be later on.
              - paragraph [ref=e128]: In the good old days, when Wall Street didn’t have to worry about things like ethics and fairness, the brokers would publish two estimates; one for the man in the street and one for their favorite customers. This second number shared only with special customers was called the whisper number.
              - paragraph [ref=e129]:
                - img "stock ratings" [ref=e130]
              - paragraph [ref=e131]: These days listed companies and brokers get into a lot of trouble if they don’t share information with everyone at the same time.
              - paragraph [ref=e132]: However, closer to the date of the results announcement that number may be informally updated. This might be the result of rumors or a result of a famous investor sharing his views. It may also be the result of similar companies publishing results which prompt a revision of various assumptions.
              - paragraph [ref=e133]:
                - text: Also, company management may publish
                - strong [ref=e134]: a profit warning or pre-announcement if they believe the actual number will be significantly different from what the market was expecting
                - text: . This will happen when the statements are almost fully drawn up but have yet to be signed off by auditors.
              - paragraph [ref=e135]:
                - text: A profit warning is a voluntary disclosure to cushion the effect of results that are either far better, or usually far worse than the market is expecting. They won’t necessarily say exactly what the number is, but will provide a range.
                - link "Here’s an example of a profit warning from Swatch" [ref=e136] [cursor=pointer]:
                  - /url: http://www.bloomberg.com/news/articles/2016-07-15/swatch-says-first-half-profit-slumped-as-much-as-60-percent
                - text: .
            - heading "The Earnings Call" [level=2] [ref=e137]
            - generic [ref=e138]:
              - paragraph [ref=e139]: Alright, we’ve covered most of what transpires leading up to earnings dates. Now let’s take a look at what goes down when we reach that fateful day for a company.
              - paragraph [ref=e140]: A company’s financial results are submitted to the SEC and published via a press release to all major media houses. The exchanges on which the share is listed will usually also publish the press release on its website.
              - paragraph [ref=e141]: An earnings call will often be scheduled for later on the same day or for the next day. The earnings calls take the form of a conference call or sometimes a webcast. It is usually open to all shareholders and invited analysts. It may be open to the general public.
              - heading "The objective for the conference call is to clarify details of the results and provide insight into the business strategy." [level=3] [ref=e142]
              - paragraph [ref=e143]: An earnings call is like a follow-up phone call after an email. It might be a little less formal, and you’ll have lots of questions. For Terrific Tacos, you might want to know what customer feedback has been like, and which locations have the highest traffic.
              - paragraph [ref=e144]: During an earnings call, the CEO and CFO (chief financial officer) will usually talk through the financial results and the business strategy. The call will then be opened to questions from analysts and major investors.
              - paragraph [ref=e145]:
                - text: The financial details will already be in the public domain, so the most important aspects of an earnings call are
                - strong [ref=e146]: qualitative rather than quantitative
                - text: .
              - heading "Some of the issues that investors will want to hear about are:" [level=4] [ref=e147]
              - list [ref=e148]:
                - listitem [ref=e149]: The competitive landscape
                - listitem [ref=e150]: Costs
                - listitem [ref=e151]: Cost-cutting measures
                - listitem [ref=e152]:
                  - text: Pricing power
                  - generic [ref=e153]: –
                  - text: can the company increase prices faster than costs?
                - listitem [ref=e154]: Research and development
                - listitem [ref=e155]: New products on the horizon
                - listitem [ref=e156]: Management succession plan
                - listitem [ref=e157]: Failures within the business
              - 'heading "An example: Google" [level=3] [ref=e158]'
              - paragraph [ref=e159]: Google’s quarterly results for the 4th quarter of 2015 are a good example of how an earnings call can change the perception of a share. Their results fell short of analyst expectations and the stock immediately fell 3%.
              - paragraph [ref=e160]: During the conference call, it emerged that part of that shortfall was due to currency losses. If a company makes money in an international market, those earnings are going to change if the dollar strengthens or weakens. So, for Google, this meant their earnings at the time of reporting took a knock.
              - paragraph [ref=e161]: It also emerged that there was a problem with inventory for their Nexus smartphones. Demand had been higher than anticipated, and their suppliers could not keep up. This meant that there was pent up demand which would translate into increased sales in the next quarter.
              - paragraph [ref=e162]: Both of these issues were temporary and not an indication that there were problems at the company. As a result, the share shot up 5 percent after the call.
              - heading "Next up…we look beyond the company!" [level=3] [ref=e163]
              - paragraph [ref=e164]: So far we’ve focussed on how company-specific news affects expectations and the share price. But, for investors to really get ahead of the game, they need to look at the business environment as well. We’ll have a look at some of the external factors in the next section.
            - heading "Stocks and Sectors" [level=2] [ref=e165]
            - generic [ref=e166]:
              - paragraph [ref=e167]: Earnings season takes place four times each year, just after the end of each quarter. Each season starts two weeks after the end of the quarter and lasts for about three weeks. That’s the period when about 80 percent of companies report. As results from over 3000 companies are published, a picture of the corporate economy begins to emerge.
              - paragraph [ref=e168]: Earnings from each sector and from the largest companies can give investors clues as to how companies in other sectors may do. Share prices often begin to react as competitors release results.
              - heading "These are a few of the factors investors will look for:" [level=3] [ref=e169]
              - list [ref=e171]:
                - listitem [ref=e172]: Some sectors will show higher than expected sales while others fall short
                - listitem [ref=e173]: The effects of inflation will become apparent
                - listitem [ref=e174]: Whether consumer spending is increasing or decreasing
                - listitem [ref=e175]: The effect of the oil price will give clues as to whether inflation will increase
                - listitem [ref=e176]: Whether or not changes in interest rates are feeding into any sectors
              - paragraph [ref=e177]:
                - text: Earnings season tends to affect the relationship between
                - strong [ref=e178]: defensive companies
                - text: and
                - strong [ref=e179]: consumer discretionary companies
                - text: .
              - paragraph [ref=e180]:
                - strong [ref=e181]: Defensive companies are those that tend to do the same regardless of the economy
                - text: . Companies that make everyday household products have relatively stable earnings. You don’t buy more toothpaste in a strong economy and less during a recession. For this reason, during weak economic periods, investors like to own these stable, if boring, companies.
              - paragraph [ref=e182]:
                - strong [ref=e183]: Consumer discretionary companies are those that sell non-essential items
                - text: like automobiles, electronics and holidays. These companies have more cyclical earnings than defensive companies.
              - paragraph [ref=e184]: If consumer discretionary companies report weaker than expected earnings, share prices of defensive companies will often rise, or outperform.
              - heading "Some other relationships that investors keep and eye on:" [level=4] [ref=e185]
              - list [ref=e186]:
                - listitem [ref=e187]: If corporate profits are good, that’s good for banks which make money from the rest of the economy
                - listitem [ref=e188]: Consumer spending is good for banks as more consumers make use of credit
                - listitem [ref=e189]: Manufacturing is good for mining companies as they source raw materials
                - listitem [ref=e190]: If travel companies do well, that’s good for airlines
              - paragraph [ref=e191]: You may be wondering how on earth you can keep track of all this. Well, an easy way is to look at which sector ETFs begin to outperform the market and which begin to underperform the market. The prices of sector indices and ETFs are always a good way to get an idea of what the market thinks of each sector.
              - paragraph [ref=e192]:
                - text: There are thousands of ETFs around, but the “SPDR” products are excellent for sector specific ETFs. You can view the relative performance of the sectors
                - link "on their homepage" [ref=e193] [cursor=pointer]:
                  - /url: http://www.sectorspdr.com/sectorspdr/
                - text: .
            - heading "Forecasting" [level=2] [ref=e194]
            - generic [ref=e195]:
              - paragraph [ref=e196]:
                - text: Analysts
                - emphasis [ref=e197]: love
                - text: Excel. They maintain complex Excel models for each company they cover, and during earnings season they pour over the financial results and update their models.
              - paragraph [ref=e198]:
                - strong [ref=e199]: An analyst’s job is to forecast the future profitability of a company as accurately as possible
                - text: . To do this they need a model for each company, and they need to keep tweaking this model to make sure it’s as accurate as possible. They’re never going to get it exactly right, but their career depends on them being amongst the best. So they need to learn as much as possible about the company.
              - paragraph [ref=e200]: During earnings season, they revisit all their assumptions and determine where they may have gone wrong. After rerunning all their calculations, they will usually publish an updated forecast for the following quarters and years.
              - paragraph [ref=e201]: Analysts will often have a face to face meetings with company management. Much of the analysis will be qualitative. They are not only interested in numbers but in how the business is doing. The more time they spend talking to management the more they can learn.
              - paragraph [ref=e202]: They will listen to recordings of the earnings call a few times. Sometimes it is not what’s said, but what is not said that can provide clues.
              - paragraph [ref=e203]: They will also look at the rest of the market for clues as to the environment their companies are likely to be operating in.
              - paragraph [ref=e204]: They will also give presentations to all their major clients and give a detailed breakdown of where they see each company going.
              - 'heading "An Example: Terrific Tacos (Again!)" [level=3] [ref=e205]'
              - paragraph [ref=e206]: A wall street analyst probably wouldn’t cover Terrific Tacos. But, for the sake of this course let’s imagine they do.
              - paragraph [ref=e207]: The analyst has forecast a profit of $2000 for this month, $2,400 next month and $2,700 the following month.
              - paragraph [ref=e208]: The company discloses that the profit for this month is actually $2,400. If the business were a listed entity that would be good for the share price, right?
              - paragraph [ref=e209]: Well, when the analyst digs into the numbers he finds a problem. Food costs are soaring and in response, the company raised its prices. This meant it took in more money. However, most of the costs associated with the tacos sold were from ingredients ordered before prices increased. This meant the profit margin was based on higher retail costs and lower wholesale costs.
              - paragraph [ref=e210]: But, the analyst realizes that next month the higher input costs are going to cut into that margin and profits will be lower. He, therefore, issues a sell recommendation on the stock. The current share price just doesn’t reflect the likely profits for next month.
              - paragraph [ref=e211]:
                - img "stock ratings" [ref=e212]
              - heading "Next up…we look at how earnings season affects YOU, the investor" [level=3] [ref=e213]
              - paragraph [ref=e214]:
                - text: In this chapter, we looked at how analysts and investors study companies to get a picture of their
                - strong [ref=e215]: future profitability
                - text: . But, share prices are actually driven by the market and the market’s collective views on companies. So, it’s important to understand what the rest of the market thinks about a company too. In the next chapter, we’ll look at a couple of the tricks investors can use to get ahead of the game.
