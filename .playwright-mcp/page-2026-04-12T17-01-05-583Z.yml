            - paragraph [ref=e378]: Seeking Alpha has its own unique dividend grading system that helps you evaluate the strength, growth, and reliability of a stock’s dividend.
            - paragraph [ref=e379]: Dividend Grades give you a different score for a company’s dividend safety, growth, yield, and consistency.
            - paragraph [ref=e380]: If you’re looking to balance your portfolio out with a big-name, dividend producing company, or you want to pursue an income investing strategy, Seeking Alpha’s dividend grades can get you there.
            - heading "Stock Comparison Tool" [level=4] [ref=e381]
            - figure [ref=e383]:
