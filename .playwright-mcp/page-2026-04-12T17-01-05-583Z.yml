            - paragraph [ref=e365]: The Top Rated Stocks screener is a special tool for Premium users that automatically finds you the most promising stocks by applying filters for the best quant ratings, Seeking Alpha author ratings, Wall Street analyst ratings, and several factor ratings.
            - paragraph [ref=e366]: When you use the Top Rated Stocks screener, you’re getting evaluations of a stock from three different perspectives, all with different motives and methods.
            - paragraph [ref=e367]: Seeking Alpha authors are independent investors who spend hours searching through news and financial statements in order to get a good read on the fundamentals of a stock.
            - paragraph [ref=e368]: Wall Street analysts are financial professionals who have access to expensive tools and research that help them build thorough financial models such as discounted cash flow (DCF) models that can provide a good estimate on the valuation of a company.
            - paragraph [ref=e369]: The quant, or quantitative analysis, system is an objective, unemotional stock evaluation system that is executed entirely through computer algorithms.
            - paragraph [ref=e370]: When you have a stock that is rated highly by all three of these sources, it will appear on the Top Rated Stocks screener, making it easy to know that you can be confident in the stocks on the list!
            - heading "Market Analysis and Earnings Call Transcripts" [level=4] [ref=e371]
            - paragraph [ref=e372]: With a Premium subscription to Seeking Alpha, you can read transcripts and listen to audio recordings of earnings and conference calls for stocks that aren’t covered anywhere else.
            - paragraph [ref=e373]: Earnings calls help us see if there were any surprises by comparing the last quarter’s earnings to what they were expected to be.
            - paragraph [ref=e374]: We can also use information given in earnings forecasts to make educated guesses on whether a stock’s price will rise or fall.
            - heading "Dividend Grades & Metrics" [level=4] [ref=e375]
            - figure [ref=e376]:
