                      - listitem [ref=e132]: AGX is up 233% in just 13 months
                      - listitem [ref=e133]: EAT is up 200% in just 14 months
                      - listitem [ref=e134]: UBER is up 133%
                      - listitem [ref=e135]: RCL is up 121% in 15 months
                      - listitem [ref=e136]: CRDO is up 157% since Feb, 2025
                      - listitem [ref=e137]: MFC is up 101% in 11 months
                      - listitem [ref=e138]: CAAP is up 124% in just 6 months
                      - listitem [ref=e139]: SFM was sold when it was up 118% in just 13 months
                      - listitem [ref=e140]: They have sold 41 of their 84 picks
                      - listitem [ref=e141]:
                        - strong [ref=e142]: And an impressive 75%% of all of their picks are profitable
            - paragraph [ref=e143]: The Seeking Alpha platform is powered by information, ideas, research, analysis, and opinions crowdsourced from its users.
            - paragraph [ref=e144]: This means that their users submit their thoughts and research on U.S. stocks, ETFs, mutual funds, commodities and cryptocurrencies. But this is no simple “message board” – their posts are well thought-out, detailed research reports that are reviewed by the Seeking Alpha editorial staff to make sure the content passes a quality review.
            - paragraph [ref=e145]: They have over 7,000 writers and publish 10,000 stock opinions per month. Each author is carefully vetted by the Seeking Alpha team to make sure that they are credible and don’t have any conflicts of interest with the stocks they’re discussing.
            - paragraph [ref=e146]: In addition to all their crowdsourced stock research, Seeking Alpha also provides a variety of stock ratings. These ratings include a Quantitative Analysis Rating, a Seeking Alpha Author Rating, and a Wall Street Rating. These ratings have proven to be valuable at predicting future performance. But here’s the catch. The Wall Street Ratings are available to free members, while the Quant and the Author Ratings are only available to Premium members.
            - separator [ref=e147]
            - paragraph [ref=e148]: I have become such a believer in Seeking Alpha that I started buying every Alpha Picks each month in my ETrade account. My personal results of these trades, which I share below, gave me proof that their model works, just like the academic study found. Keep reading our Seeking Alpha review to get all the information you need to choose the right Seeking Alpha subscription for your needs.
