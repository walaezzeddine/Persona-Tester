            - paragraph [ref=e385]: Seeking Alpha’s quant system has a stellar history of beating the market, making it a valuable tool for deciding which stocks to invest in.
            - paragraph [ref=e386]: The Seeking Alpha quant system gives stocks a rating based on value, growth, profitability, momentum, and EPS (earnings per share) revisions.
            - paragraph [ref=e387]: With a Premium subscription, you can see all quant ratings and underlying metrics that determine what quant rating stocks receive. They’re a useful tool when comparing stocks and work well with Seeking Alpha Premium’s comparison tool, which allows you to compare 7 different stocks at the same time.
